const TOTAL_STAGES = 12;
const HEART_MAX = 5;

// ─────────────────────────────────────────────
// STAGE CONFIGURATION
// ─────────────────────────────────────────────
// itemCount: how many gems to seed at start (more in early stages for quicker play)
// Mechanic introduction:
//   1-2  gems only
//   3-4  + spotlights
//   5-6  + spiky enemy (still no bomb)
//   7    + pearls (still no bomb)
//   8    + bomb (no spiky)
//   9-12 full game
// New gem introduced each stage matches the necklace gem for that stage by colour:
//   1  gem      → green  (GEM_GREEN_STAR   #80d6a8)
//   2  shard2   → blue   (GEM_BLUE_SAPPH   #aac2f0)
//   3  custom4  → peach  (GEM_PEACH_DROP   #f0ceaa)
//   4  custom1  → wine   (GEM_GARNET       #572e42)
//   5  custom3  → aqua   (GEM_AQUAMARINE   #a9e2ff)
//   6  shard5   → pink   (GEM_AMETHYST     #f3cafa)
//   7  shard6   → cream  (GEM_BLUE_CRYSTAL — best remaining)
//   8  shard3   → tan    (GEM_BLUE_HEART   — best remaining)
//   9  shard4   → green  (GEM_GREEN_MARQ   #3fd634)
//  10  custom2  → gold   (GEM_SMALL_GREEN  — best remaining)
//  11  custom5  → orange (GEM_RED_ORANGE   #dd5b36)

const HEART_REGEN_MS = 2 * 60 * 60 * 1000; // 2 hours

// Persistent state
let totalPearls = parseInt(localStorage.getItem('totalPearls') || '0');
let hearts = parseInt(localStorage.getItem('hearts') || '2');
let lastHeartTime = parseInt(localStorage.getItem('lastHeartTime') || Date.now().toString());
let currentStage = parseInt(localStorage.getItem('currentStage') || '1');
let heartTimerInterval = null;

function saveMenuState() {
    localStorage.setItem('totalPearls', totalPearls.toString());
    localStorage.setItem('hearts', hearts.toString());
    localStorage.setItem('lastHeartTime', lastHeartTime.toString());
    localStorage.setItem('currentStage', currentStage.toString());
}

function regenHearts() {
    if (hearts >= HEART_MAX) return;
    const now = Date.now();
    const elapsed = now - lastHeartTime;
    const gained = Math.floor(elapsed / HEART_REGEN_MS);
    if (gained > 0) {
        hearts = Math.min(HEART_MAX, hearts + gained);
        lastHeartTime = lastHeartTime + gained * HEART_REGEN_MS;
        if (hearts >= HEART_MAX) lastHeartTime = now;
        saveMenuState();
    }
}

function getNextHeartTime() {
    if (hearts >= HEART_MAX) return null;
    const remaining = HEART_REGEN_MS - (Date.now() - lastHeartTime);
    return Math.max(0, remaining);
}

function formatTime(ms) {
    const totalSec = Math.ceil(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateHeartsUI() {
    regenHearts();
    const countEl = document.getElementById('hearts-count');
    const timerEl = document.getElementById('heart-timer');
    if (countEl) countEl.textContent = hearts;
    const remaining = getNextHeartTime();
    if (timerEl) {
        timerEl.textContent = remaining !== null ? formatTime(remaining) : 'FULL';
    }
}

function startHeartTimer() {
    if (heartTimerInterval) clearInterval(heartTimerInterval);
    heartTimerInterval = setInterval(updateHeartsUI, 1000);
    updateHeartsUI();
}

function useHeart() {
    if (hearts <= 0) return false;
    hearts--;
    if (hearts < HEART_MAX && lastHeartTime === 0) lastHeartTime = Date.now();
    if (hearts === HEART_MAX - 1) lastHeartTime = Date.now();
    saveMenuState();
    updateHeartsUI();
    return true;
}

// DEBUG CHEAT: press Enter or tap hearts pill to add a heart
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        hearts = Math.min(HEART_MAX, hearts + 1);
        saveMenuState();
        updateHeartsUI();
    }
    // TEMP CHEAT — press ` (backtick) to jump straight into Stage 1 (Green Star test)
    if (e.key === '`') {
        currentStage = Math.max(currentStage, 1);
        startStage(1);
    }
});
document.querySelector('.hearts-container').addEventListener('click', () => {
    hearts = Math.min(HEART_MAX, hearts + 1);
    saveMenuState();
    updateHeartsUI();
});

function updatePearlUI() {
    const el = document.getElementById('menu-pearl-count');
    if (el) el.textContent = totalPearls;
}

function updateAvatarColor() {
    const el = document.getElementById('avatar-mochi');
    if (el) el.style.background = window.PLAYER_COLOR || currentColor;
    renderPreviewFace(document.getElementById('avatar-face-canvas'));
}

}

    { name: 'Blue Sapphire',   polygons: GEM_BLUE_SAPPHIRE },

// Pearl bead positions from actual SVG artwork (center coordinates)
const PEARL_POSITIONS = [];
(function() {
    // Actual pearl center positions extracted from the SVG paths
    const pearlCoords = [
        [632, 917], [663, 847], [602, 826], [593, 754],
        [637, 697], [702, 662], [772, 638], [847, 631],
        [916, 660], [947, 728], [1001, 777], [1071, 800],
        [1141, 817], [1211, 834], [1281, 857], [1301, 924],
        [1256, 982]
    ];
    pearlCoords.forEach(([x, y]) => {
        PEARL_POSITIONS.push({ x: x * NM_SX, y: y * NM_SY });
    });
})();

function getGemBounds(gem) {
    if (!gem.polygons) {
        const cx = gem.cx * NM_SX, cy = gem.cy * NM_SY;
        return { minX: cx - 18, maxX: cx + 18, minY: cy - 18, maxY: cy + 18, cx, cy };
    }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    gem.polygons.forEach(poly => {
        poly.pts.split(' ').forEach(p => {
            const [x, y] = p.split(',').map(Number);
            const sx = x * NM_SX, sy = y * NM_SY;
            if (sx < minX) minX = sx;
            if (sx > maxX) maxX = sx;
            if (sy < minY) minY = sy;
            if (sy > maxY) maxY = sy;
        });
    });
    return { minX, maxX, minY, maxY, cx: (minX + maxX) / 2, cy: (minY + maxY) / 2 };
}

function renderNecklaceMap() {
    const container = document.getElementById('necklace-map');
    if (!container) return;

    let svg = `<svg viewBox="0 0 500 910" xmlns="http://www.w3.org/2000/svg">`;

    // Pearl gradient defs
    svg += `<defs>`;
    svg += `<radialGradient id="pearlFill" cx="40%" cy="35%">`;
    svg += `<stop offset="0%" stop-color="#f5f4f6"/>`;
    svg += `<stop offset="40%" stop-color="#c4c0dd"/>`;
    svg += `<stop offset="100%" stop-color="#d0cfe0"/>`;
    svg += `</radialGradient>`;
    svg += `</defs>`;

    // Draw pearl chain - earned pearls are filled, others are dim outlines
    const earnedPearls = totalPearls;
    PEARL_POSITIONS.forEach((p, i) => {
        const r = 13; // pearl radius matching artwork scale
        if (i < earnedPearls) {
            svg += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="url(#pearlFill)"/>`;
            svg += `<ellipse cx="${(p.x - r * 0.25).toFixed(1)}" cy="${(p.y - r * 0.25).toFixed(1)}" rx="${r * 0.35}" ry="${r * 0.25}" fill="rgba(255,255,255,0.6)" transform="rotate(-20 ${(p.x - r * 0.25).toFixed(1)} ${(p.y - r * 0.25).toFixed(1)})"/>`;
        } else {
            svg += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>`;
        }
    });

    // Draw gems — render highest stage first (lowest z-order) so lower stage numbers
    // sit on top and their click areas are never blocked by a higher stage's polygons.
    let arrowSvg = ''; // collected separately so arrows always render above all gems
    const gemOrder = NECKLACE_GEMS.map((gem, i) => i).reverse(); // 11→10→…→0
    gemOrder.forEach(i => {
        const gem = NECKLACE_GEMS[i];
        const stageNum = i + 1;
        const completed = stageNum < currentStage;
        const isCurrent = stageNum === currentStage;
        const unlocked = stageNum <= currentStage;

        const isLocked = !completed && !isCurrent;
        const currentClass = isCurrent ? ' current' : '';
        const stageAttr = unlocked ? ` data-stage="${stageNum}" style="cursor:pointer"` : '';

        svg += `<g class="gem-node${currentClass}"${stageAttr}>`;

        // Invisible tap target for mobile — tight padding to avoid cross-gem overlap
        if (unlocked) {
            const b = getGemBounds(gem);
            const pad = 8;
            svg += `<rect x="${b.minX - pad}" y="${b.minY - pad}" width="${b.maxX - b.minX + pad*2}" height="${b.maxY - b.minY + pad*2}" fill="rgba(0,0,0,0.001)"/>`;
        }

        if (gem.polygons) {
            if (isLocked) {
                gem.polygons.forEach(poly => {
                    svg += `<polygon points="${nmPts(poly.pts)}" fill="black" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>`;
                });
            } else {
                gem.polygons.forEach(poly => {
                    svg += `<polygon points="${nmPts(poly.pts)}" fill="${poly.fill}"/>`;
                });
            }
        } else {
            const cx = gem.cx * NM_SX, cy = gem.cy * NM_SY;
            const s = 18;
            if (isLocked) {
                svg += `<polygon points="${cx},${cy - s} ${cx + s * 0.8},${cy} ${cx},${cy + s * 0.7} ${cx - s * 0.8},${cy}" fill="black" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>`;
                svg += `<line x1="${cx}" y1="${cy - s}" x2="${cx}" y2="${cy + s * 0.7}" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>`;
                svg += `<line x1="${cx - s * 0.8}" y1="${cy}" x2="${cx + s * 0.8}" y2="${cy}" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>`;
            } else {
                svg += `<polygon points="${cx},${cy - s} ${cx + s * 0.8},${cy} ${cx},${cy + s * 0.7} ${cx - s * 0.8},${cy}" fill="${gem.color}" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>`;
                svg += `<polygon points="${cx},${cy - s} ${cx + s * 0.4},${cy - s * 0.2} ${cx},${cy + s * 0.2} ${cx - s * 0.4},${cy - s * 0.2}" fill="rgba(255,255,255,0.2)"/>`;
            }
        }

        // Stage number label


        svg += `</g>`;

        // Collect arrow — rendered after all gems so it's always visible
        if (isCurrent) {
            const b = getGemBounds(gem);
            const ax = b.cx, ay = b.minY - 14;
            arrowSvg += `<polygon points="${ax},${ay + 10} ${ax - 6},${ay} ${ax + 6},${ay}" fill="white">`;
            arrowSvg += `<animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="1s" repeatCount="indefinite"/>`;
            arrowSvg += `</polygon>`;
        }
    });

    svg += arrowSvg; // arrows always on top

    // Water reflection at bottom
    svg += `<defs>`;
    svg += `<linearGradient id="reflGrad" x1="0" y1="0" x2="0" y2="1">`;
    svg += `<stop offset="0%" stop-color="white" stop-opacity="0.12"/>`;
    svg += `<stop offset="100%" stop-color="white" stop-opacity="0"/>`;
    svg += `</linearGradient>`;
    svg += `</defs>`;
    svg += `<ellipse cx="250" cy="${2100 * NM_SY}" rx="130" ry="12" fill="url(#reflGrad)"/>`;

    svg += `</svg>`;
    container.innerHTML = svg;

    // Event delegation for gem taps (reliable on mobile)
    container.querySelector('svg').addEventListener('click', function(e) {
        let el = e.target;
        while (el && el !== this) {
            if (el.dataset && el.dataset.stage) {
                startStage(parseInt(el.dataset.stage));
                return;
            }
            el = el.parentElement;
        }
    });
}

let playingStage = 0; // tracks which stage the player is currently playing

function _updateStageLabel() {
    const el = document.getElementById('stage-label');
    if (!el) return;
    const stageN = playingStage >= 1 ? playingStage : currentStage;
    const gemName = (stageN >= 1 && stageN <= NECKLACE_GEMS.length) ? NECKLACE_GEMS[stageN - 1].name : '';
    el.textContent = gemName ? `Stage ${stageN}  ·  ${gemName}` : `Stage ${stageN}`;
}

function startStage(stageNum) {
    if (stageNum > currentStage) return; // locked
    playingStage = stageNum;
    _updateStageLabel();
    document.getElementById('main-menu').classList.remove('visible');
    document.getElementById('customizer-overlay').style.display = 'flex';
    requestAnimationFrame(() => renderPreviewFace(document.getElementById('preview-face-canvas')));
}

function openCustomizer() {
    playingStage = currentStage;
    _updateStageLabel();
    document.getElementById('main-menu').classList.remove('visible');
    document.getElementById('customizer-overlay').style.display = 'flex';
    // Render on next frame so the canvas has layout dimensions
    requestAnimationFrame(() => renderPreviewFace(document.getElementById('preview-face-canvas')));
}

function returnToMenu() {
    document.getElementById('customizer-overlay').style.display = 'none';
    document.getElementById('main-menu').classList.add('visible');
    updateAvatarColor();
    updatePearlUI();
    renderNecklaceMap();
}

function menuNavTo(tab) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.nav-tab[data-tab="${tab}"]`).classList.add('active');

    if (tab === 'settings') {
        document.getElementById('settings-overlay').classList.add('visible');
    } else if (tab === 'shop') {
        document.getElementById('shop-overlay').classList.add('visible');
    } else if (tab === 'online') {
        // Non-functional for now
    }
}

function closeSettings() {
    document.getElementById('settings-overlay').classList.remove('visible');
    document.querySelector('.nav-tab[data-tab="home"]').click();
}

function closeShop() {
    document.getElementById('shop-overlay').classList.remove('visible');
    document.querySelector('.nav-tab[data-tab="home"]').click();
}

function initMainMenu() {
    updateHeartsUI();
    startHeartTimer();
    updatePearlUI();
    updateAvatarColor();
    renderNecklaceMap();
}

// Dev cheat: ] = clear current stage, [ = undo last clear
window.addEventListener('keydown', e => {
    const menu = document.getElementById('main-menu');
    if (!menu || !menu.classList.contains('visible')) return;
    if (e.key === ']') {
        if (currentStage <= TOTAL_STAGES) { currentStage++; saveProgress(); renderNecklaceMap(); }
    } else if (e.key === '[') {
        if (currentStage > 1) { currentStage--; saveProgress(); renderNecklaceMap(); }
    }
});

// When game ends (win or lose), award pearls and return to necklace map
function returnToMenuAfterGame() {
    // Award pearls for enemies eaten during the game
    stopWinAnim();
    totalPearls += enemiesEaten;
    if (winPhase === 2) {
        // Win — advance frontier past the completed stage
        const nextStage = (playingStage >= 1 ? playingStage : currentStage) + 1;
        if (nextStage > currentStage && nextStage <= TOTAL_STAGES + 1) {
            currentStage = nextStage;
        }
    } else {
        // Game over — lose a heart
        useHeart();
    }
    saveMenuState();
    // Flag to skip opening screen on reload and go straight to map
    sessionStorage.setItem('returnToMap', '1');
    location.reload();
}

// If returning from a game, skip opening screen and go straight to map
if (sessionStorage.getItem('returnToMap')) {
    sessionStorage.removeItem('returnToMap');
    document.getElementById('opening-screen').style.display = 'none';
    document.getElementById('main-menu').classList.add('visible');
    initMainMenu();
}

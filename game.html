        drawDynamicStreak(0.3, 0.22, 0.8, 4.1); 
        drawDynamicStreak(0.65, 0.15, 0.6, 1.5); 
    }

    entityCtx.save();
    entityCtx.clip(bodyPath);
    player.bones.forEach(b => {
        entityCtx.save();
        entityCtx.translate(player.x+b.curX, player.y+b.curY);
        entityCtx.rotate(b.rot);
        entityCtx.globalAlpha = Math.min(1, b.scale / (b.originalScale || b.scale));
        draw3DItem(entityCtx, b, player.x+b.curX, player.y+b.curY, false, true);
        entityCtx.restore();
    });
    
    // Body fill uses customized player color
    entityCtx.fillStyle = hexToRgba(window.PLAYER_COLOR, 0.85); entityCtx.fill(bodyPath);
    const skinHL = entityCtx.createRadialGradient(player.x-80,player.y-100,10, player.x-20,player.y-40,250);
    skinHL.addColorStop(0, 'rgba(255,255,255,0.5)'); skinHL.addColorStop(1, 'rgba(255,255,255,0)');
    entityCtx.fillStyle = skinHL; entityCtx.fill(bodyPath);
    if (spotlightDanger) {
        const flkA = Math.max(0.10, 0.28 + Math.sin(globalFlickerPhase) * 0.13 + Math.sin(globalFlickerPhase * 1.7) * 0.08);
        entityCtx.fillStyle = `rgba(255, 20, 0, ${flkA})`;
        entityCtx.fill(bodyPath);
    }
    entityCtx.restore();

    // Paint over anti-aliased dark fringe at body edge
    if (IS_TOUCH) {
        entityCtx.save();
        entityCtx.strokeStyle = hexToRgba(window.PLAYER_COLOR, 0.9);
        entityCtx.lineWidth = 2.5;
        entityCtx.stroke(bodyPath);
        entityCtx.restore();
    }

    items.forEach(it => {
        if (!it.active || it.sucking <= 0.05) return;
        const mx = player.x, my = player.y - 15;
        const dx = mx - it.x, dy = my - it.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 30) return;

        const angle = Math.atan2(dy, dx);
        const perp = angle + Math.PI/2;
        
        entityCtx.save();
        entityCtx.beginPath();
        const lines = 2 + Math.floor(it.sucking * 4);
        for(let i=0; i<lines; i++) {
            const offS = (Math.random()-0.5) * it.w * 1.2;
            const offE = (Math.random()-0.5) * 15;
            const sx = it.x + Math.cos(perp)*offS, sy = it.y + Math.sin(perp)*offS;
            const ex = mx + Math.cos(perp)*offE, ey = my + Math.sin(perp)*offE;
            entityCtx.moveTo(sx, sy);
            entityCtx.quadraticCurveTo((sx+ex)/2 + (Math.random()-0.5)*dist*0.1, (sy+ey)/2 + (Math.random()-0.5)*dist*0.1, ex, ey);
        }
        entityCtx.strokeStyle = `rgba(255, 255, 255, ${it.sucking * (0.2 + Math.random()*0.3)})`;
        entityCtx.lineWidth = 2 + Math.random() * 3;
        entityCtx.stroke();
        entityCtx.restore();
    });

    items.forEach(it => {
        if (!it.active) return;
        const dm = Math.hypot(player.x-it.x, (player.y-15)-it.y);
        entityCtx.save();
        const _t = player.anim.time;
        // Rotation: two independent waves so the rock never feels periodic
        const floatRot = it.type !== 'pearl'
            ? 0.045 * Math.sin(_t * (it.rotSpeed  || 0.8) + (it.rotPhase   || 0))
            + 0.025 * Math.sin(_t * (it.rotSpeed  || 0.8) * 1.73 + (it.rotPhase || 0) + 1.9)
            : 0;
        entityCtx.translate(it.x,it.y); entityCtx.rotate(it.rot + floatRot);
        const sc = Math.max(0.1, it.sucking > 0.1 ? Math.min(1,dm/400) : 1);
        // Scale: two waves at different speeds so the breath feels irregular
        const floatScale = it.type !== 'pearl'
            ? 1 + (it.floatAmp  || 0.07) * Math.sin(_t * (it.floatSpeed  || 1.0) + (it.floatPhase  || 0))
            + (it.floatAmp  || 0.07) * 0.45 * Math.sin(_t * (it.floatSpeed2 || 0.6) + (it.floatPhase2 || 0))
            : 1;
        entityCtx.scale(sc * floatScale, sc * floatScale);
        entityCtx.globalAlpha = 1;

        if (it.type === 'pearl') {
            const t = player.anim.time;
            const pearlR = it.w * 0.42;

            // Outer pulsing rainbow aura
            const auraR = pearlR * (1.6 + 0.3 * Math.sin(t * 4));
            const auraGrad = entityCtx.createRadialGradient(0, 0, pearlR * 0.5, 0, 0, auraR);
            const hueShift = (t * 60) % 360;
            auraGrad.addColorStop(0, `hsla(${hueShift}, 80%, 85%, 0.4)`);
            auraGrad.addColorStop(0.5, `hsla(${(hueShift + 120) % 360}, 90%, 75%, 0.2)`);
            auraGrad.addColorStop(1, `hsla(${(hueShift + 240) % 360}, 80%, 80%, 0)`);
            entityCtx.fillStyle = auraGrad;
            entityCtx.beginPath();
            entityCtx.arc(0, 0, auraR, 0, Math.PI * 2);
            entityCtx.fill();

            // Draw the base pearl
            draw3DItem(entityCtx, it, it.x, it.y, true);

            // Iridescent holographic overlay (TCGP style)
            entityCtx.save();
            entityCtx.globalCompositeOperation = 'overlay';
            // Sweeping diagonal gradient that shifts with time
            const sweepAngle = t * 1.5;
            const sweepLen = pearlR * 1.2;
            const gx = Math.cos(sweepAngle) * sweepLen;
            const gy = Math.sin(sweepAngle) * sweepLen;
            const holoGrad = entityCtx.createLinearGradient(-gx, -gy, gx, gy);
            const h1 = (t * 80) % 360;
            holoGrad.addColorStop(0, `hsla(${h1}, 100%, 70%, 0.35)`);
            holoGrad.addColorStop(0.25, `hsla(${(h1 + 90) % 360}, 100%, 75%, 0.3)`);
            holoGrad.addColorStop(0.5, `hsla(${(h1 + 180) % 360}, 100%, 70%, 0.35)`);
            holoGrad.addColorStop(0.75, `hsla(${(h1 + 270) % 360}, 100%, 75%, 0.3)`);
            holoGrad.addColorStop(1, `hsla(${h1}, 100%, 70%, 0.35)`);
            entityCtx.fillStyle = holoGrad;
            entityCtx.beginPath();
            entityCtx.arc(0, 0, pearlR, 0, Math.PI * 2);
            entityCtx.fill();
            entityCtx.restore();

            // Specular highlight that moves with time
            entityCtx.save();
            entityCtx.globalCompositeOperation = 'screen';
            const specX = Math.cos(t * 2) * pearlR * 0.3;
            const specY = Math.sin(t * 2.5) * pearlR * 0.3 - pearlR * 0.15;
            const specGrad = entityCtx.createRadialGradient(specX, specY, 0, specX, specY, pearlR * 0.5);
            specGrad.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
            specGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.15)');
            specGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            entityCtx.fillStyle = specGrad;
            entityCtx.beginPath();
            entityCtx.arc(0, 0, pearlR, 0, Math.PI * 2);
            entityCtx.fill();
            entityCtx.restore();

        } else {
            draw3DItem(entityCtx, it, it.x, it.y, true);
        }
        entityCtx.restore();
    });


    entityCtx.restore();

    ctx.globalCompositeOperation = 'source-over';
    if (winPhase !== 3) {
        ctx.drawImage(entityCanvas, 0, 0);
    } else {
        // Dissolve the entity canvas out quickly — procedural liquid blob takes over
        const _entA = Math.max(0, 1 - deathTimer / 50);
        if (_entA > 0) { ctx.globalAlpha = _entA; ctx.drawImage(entityCanvas, 0, 0); ctx.globalAlpha = 1; }
    }

    // Pearl glares drawn on main ctx in screen space — after entityCanvas, so they render on top
    if (winPhase === 0) {
        items.forEach(it => {
            if (!it.active || it.type !== 'pearl') return;
            // Convert world → screen
            const sx = (it.x - camera.x) * camera.zoom + canvas.width  / 2;
            const sy = (it.y - camera.y) * camera.zoom + canvas.height / 2;
            // Midpoint between actual pearl size and previous oversized version
            const sr = it.w * 0.42 * camera.zoom * 2.2;
            drawPearlGlare(ctx, sx, sy, sr, player.anim.time);
        });
    }

    lightCtx.globalCompositeOperation = 'source-over';
    lightCtx.clearRect(0, 0, lightCanvas.width, lightCanvas.height);
    lightCtx.globalCompositeOperation = 'lighter';

    spotlights.forEach(spot => {
        const sx = (spot.x - camera.x) * camera.zoom + canvas.width/2;
        const sy = (spot.y - camera.y) * camera.zoom + canvas.height/2;
        const sr = spot.r * camera.zoom;
        
        const sweepPhase = Math.abs(Math.sin(spot.angle * 0.8)); 
        const dynamicSquash = 1.0 - (sweepPhase * 0.25);
        const warpAngle = spot.angle * 0.5;

        lightCtx.save();
        lightCtx.translate(sx, sy);
        
        lightCtx.rotate(warpAngle);
        lightCtx.scale(1, dynamicSquash); 
        
        // ALL spotlights go red when player is inside any one of them
        // Flicker applied via globalAlpha (avoids re-baking into gradient stops each frame)
        if (spotlightDanger) {
            lightCtx.globalAlpha = 0.58 + Math.sin(globalFlickerPhase * 1.0 + spot.orbitR * 0.002) * 0.24
                                        + Math.sin(globalFlickerPhase * 1.7 + spot.orbitR * 0.003) * 0.14;
            // Each spotlight gets a unique red shade
            const _g = Math.floor((spot.orbitR * 0.11 + 8) % 70);
            const _b = Math.floor((spot.orbitR * 0.04 + 0) % 30);
            const _col = `255,${_g},${_b}`;
            const grad = lightCtx.createRadialGradient(0,0, sr*0.85, 0,0, sr);
            grad.addColorStop(0,   `rgba(${_col},0.3)`);
            grad.addColorStop(0.9, `rgba(${_col},0.3)`);
            grad.addColorStop(1,   `rgba(${_col},0)`);
            lightCtx.fillStyle = grad;
        } else {
            const grad = lightCtx.createRadialGradient(0,0,sr*0.85, 0,0,sr);
            grad.addColorStop(0,   `rgba(${spot.color},0.3)`);
            grad.addColorStop(0.9, `rgba(${spot.color},0.3)`);
            grad.addColorStop(1,   `rgba(${spot.color},0)`);
            lightCtx.fillStyle = grad;
        }

        lightCtx.beginPath(); lightCtx.arc(0,0,sr,0,Math.PI*2); lightCtx.fill();
        lightCtx.globalAlpha = 1;
        lightCtx.restore();
    });

    const _lightFade = winPhase === 3 ? Math.max(0, 1 - Math.min(1, deathTimer / 70) * 2) : 1;
    if (_lightFade > 0) {
        ctx.globalAlpha = _lightFade;
        ctx.globalCompositeOperation = 'screen';
        ctx.drawImage(lightCanvas, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
    }

    // ── UNIFIED DEATH / NORMAL DRAW ──────────────────────────────────────
    if (winPhase === 3) {
        // dp 0→1 over 300 frames; ease-in so melt starts slow then flows fast
        const dp   = Math.min(1, deathTimer / 300);
        const ease = dp * dp * (3 - 2 * dp); // smoothstep: slow-fast-slow

        ctx.save(); // camera
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-camera.x, -camera.y);

        // ── Procedural liquid melt blob ───────────────────────────────────
        const bR  = player.baseR;
        const bRy = bR * Math.max(0.055, 1 - ease * 0.945); // height: full → flat
        const bRx = bR * (1 + ease * 4.5);                  // width:  expands wide
        const bCx = player.x;
        // Center sinks as it flattens (bottom stays roughly on same plane)
        const bCy = player.y + (bR - bRy) * 0.4;
        const bT  = deathTimer * 0.016;

        // Organic surface wobble — large during melt, tiny ripple once settled
        const wobMelt   = bR * Math.max(0, 0.13 * (1 - ease * 1.7));
        const wobRipple = bR * 0.012 * Math.max(0, (ease - 0.7) / 0.3);
        const wobAmt    = wobMelt + wobRipple;

        const buildBlobPath = () => {
            ctx.beginPath();
            for (let i = 0; i <= 72; i++) {
                const a   = (i / 72) * Math.PI * 2;
                const wob = wobAmt * (
                    Math.sin(a * 3 + bT * 9.1) * 0.55 +
                    Math.sin(a * 5 + bT * 6.4) * 0.30 +
                    Math.sin(a * 8 + bT * 13.7) * 0.15
                );
                const x = bCx + Math.cos(a) * (bRx + wob);
                const y = bCy + Math.sin(a) * (bRy + wob * 0.2);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.closePath();
        };

        // Fade in as entity canvas fades out; fade out at the very end
        const blobA = Math.min(1, Math.max(0, (deathTimer - 15) / 40))
                    * Math.max(0, 1 - Math.max(0, dp - 0.9) * 10);

        if (blobA > 0.01) {
            ctx.globalAlpha = blobA;

            // 1. Base colour fill
            buildBlobPath();
            ctx.fillStyle = window.PLAYER_COLOR;
            ctx.fill();

            // 2. Dark depth rim — gives the puddle a liquid edge
            buildBlobPath();
            const rimG = ctx.createRadialGradient(bCx, bCy, bRx * 0.5, bCx, bCy, bRx * 1.02);
            rimG.addColorStop(0,    'rgba(0,0,0,0)');
            rimG.addColorStop(0.65, 'rgba(0,0,0,0)');
            rimG.addColorStop(1,    'rgba(0,0,0,0.3)');
            ctx.fillStyle = rimG;
            ctx.fill();

            // 3. Specular highlight — top-left sheen like liquid surface
            buildBlobPath();
            const hlX = bCx - bRx * 0.18, hlY = bCy - bRy * 0.38;
            const hlG = ctx.createRadialGradient(hlX, hlY, 0, hlX, hlY, Math.max(bRx, bRy) * 0.55);
            hlG.addColorStop(0,    'rgba(255,255,255,0.52)');
            hlG.addColorStop(0.45, 'rgba(255,255,255,0.14)');
            hlG.addColorStop(1,    'rgba(255,255,255,0)');
            ctx.fillStyle = hlG;
            ctx.fill();

            ctx.globalAlpha = 1;
        }

        // ── Goo droplets splattering from the melt ────────────────────────
        const blobFade = Math.max(0, 1 - Math.max(0, dp - 0.4) * 2.5);
        if (blobFade > 0.01) {
            gooBlobs.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);
                const sqz = b.squeezed;
                ctx.scale(1 + sqz * 2.5, Math.max(0.1, 1 - sqz * 0.9));
                ctx.beginPath();
                for (let i = 0; i <= 28; i++) {
                    const a   = (i / 28) * Math.PI * 2;
                    const wob = 1 + Math.sin(a*3 + b.wobble)*0.14 + Math.cos(a*5 + b.wobble*0.7)*0.09;
                    const r   = b.r * wob;
                    i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                }
                ctx.closePath();
                ctx.fillStyle = window.PLAYER_COLOR;
                ctx.globalAlpha = b.alpha * blobFade;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-b.r*0.22, -b.r*0.22, b.r*0.32, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.26)';
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.restore();
            });
        }

        // ── X eyes flash at moment of death ──────────────────────────────
        const fs2     = 1.1 + coveragePercent / 150;
        const eyeSpc2 = 40 * fs2, eyeY2 = -20 * fs2, eyeR2 = 36 * fs2;
        const xEyeA   = Math.max(0, Math.min(1, dp * 9) * Math.max(0, 1 - dp * 4));
        if (xEyeA > 0.02) {
            ctx.save();
            ctx.translate(player.x, player.y - 15);
            ctx.globalAlpha = xEyeA;
            [-1, 1].forEach(side => {
                ctx.save();
                ctx.translate(side * eyeSpc2, eyeY2);
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 7 * fs2;
                ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(-eyeR2*0.58, -eyeR2*0.58); ctx.lineTo(eyeR2*0.58, eyeR2*0.58); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(eyeR2*0.58, -eyeR2*0.58); ctx.lineTo(-eyeR2*0.58, eyeR2*0.58); ctx.stroke();
                ctx.restore();
            });
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        ctx.restore(); // camera

    } else {
        // ── NORMAL GAMEPLAY DRAW ─────────────────────────────────────────
        ctx.save(); // camera
        ctx.translate(canvas.width/2, canvas.height/2);
        if (shakeTime > 0) ctx.translate(Math.random()*20-10, Math.random()*20-10);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-camera.x, -camera.y);

        if (winPhase === 0) {
            enemies.forEach(en => {
                drawEnemy(ctx, en);
                if (huntedTime > 0) {
                    const eH = (en.time * 60) % 360;
                    drawGlareStar(ctx, en.x, en.y, en.r, en.time, eH);
                }
            });
        }

        ctx.save();
        ctx.translate(player.x, player.y-15);

        if (player.anim.mouth > 0.5) ctx.translate(Math.sin(player.anim.time*40)*1.5, Math.cos(player.anim.time*45)*1.5);

        const fs       = 1.1 + coveragePercent/150 + player.anim.puff*0.05;
        const eyeAngle = Math.atan2(rawMouse.y - canvas.height/2, rawMouse.x - canvas.width/2);
        const pupilD   = 9 * fs;
        // Per-eye-type position/size params
        const _EP = [
            { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 }, // 0 default
            { spc: 90.0, y: -29.5, r: 36.0, wm: 1.70, vc: 0.50 }, // 1 goggles
            { spc: 90.0, y: -34.0, r: 36.0, wm: 1.70, vc: 0.50 }, // 2 cute
            { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 }, // 3 (fallback)
            { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 }, // 4 (fallback)
            { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 }, // 5 (fallback)
            { spc: 35.0, y: -35.0, r: 33.0, wm: 1.70, vc: 0.50 }, // 6 anime
            { spc: 73.6, y: -45.6, r: 36.0, wm: 1.70, vc: 0.50 }, // 7 eye2 png
        ];
        const _ep    = _EP[window.PLAYER_EYE_TYPE] || _EP[0];
        const eyeSpc = (_ep.spc + player.anim.puff*3) * fs;
        const eyeY   = _ep.y * fs;
        const eyeR   = _ep.r * fs;

        function drawEye(side) {
            ctx.save();
            ctx.translate(side*eyeSpc, eyeY);
            const eyeBlink = player.anim.winkSide !== 0
                ? (player.anim.winkSide === side ? player.anim.blink : 0)
                : player.anim.blink;
            const bs = 1 - eyeBlink;
            if (bs > 0.05) {
                ctx.beginPath(); ctx.arc(0,0,eyeR,0,Math.PI*2);
                ctx.scale(1,bs); ctx.fillStyle = '#fff'; ctx.fill(); ctx.clip();
                ctx.save();
                ctx.translate(Math.cos(eyeAngle)*pupilD, Math.sin(eyeAngle)*pupilD);
                ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(0,0,eyeR*0.9,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-eyeR*0.4,-eyeR*0.4,eyeR*0.35,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(-eyeR*0.1,-eyeR*0.6,eyeR*0.15,0,Math.PI*2); ctx.fill();
                ctx.restore();
            } else {
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 6*fs; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(-eyeR*0.8,0); ctx.quadraticCurveTo(0,eyeR*0.4,eyeR*0.8,0); ctx.stroke();
            }
            ctx.restore();
        }
        // Type 6: manga-style animated eyes — tall oval sclera, massive dark pupil, white highlights
        function drawEyeColored(side) {
            ctx.save();
            ctx.translate(side * eyeSpc, eyeY);
            const eyeBlink = player.anim.winkSide !== 0
                ? (player.anim.winkSide === side ? player.anim.blink : 0)
                : player.anim.blink;
            const bs = 1 - eyeBlink;
            if (bs > 0.05) {
                ctx.scale(1, bs);
                // Sclera — tall white oval
                ctx.beginPath();
                ctx.ellipse(0, 0, eyeR, eyeR * 1.227, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.fill(); ctx.clip();
                // Pupil — huge dark ellipse, offset slightly down, tracks mouse
                ctx.save();
                ctx.translate(Math.cos(eyeAngle) * pupilD, Math.sin(eyeAngle) * pupilD);
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.ellipse(0, eyeR * 0.219, eyeR * 0.927, eyeR * 1.028, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                // White highlights — fixed relative to sclera, mirrored per side
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(eyeR * 0.353, -eyeR * 0.491, eyeR * 0.174, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeR * 0.564,  eyeR * 0.004, eyeR * 0.290, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 6 * fs; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(-eyeR * 0.8, 0); ctx.quadraticCurveTo(0, eyeR * 0.4, eyeR * 0.8, 0); ctx.stroke();
            }
            ctx.restore();
        }

        if (window.PLAYER_EYE_TYPE === 0) {
            drawEye(-1); drawEye(1);
        } else if (window.PLAYER_EYE_TYPE === 6) {
            drawEyeColored(-1); drawEyeColored(1);
        } else if (window.PLAYER_EYE_TYPE === 7) {
            // EYE2 PNG — direction states + blink squish, original colors preserved
            const blink = player.anim.blink;
            const ex = Math.cos(eyeAngle);
            const eyeDir = ex < -0.3 ? eye2Left : ex > 0.3 ? eye2Right : eye2Idle;
            if (eyeDir.complete && eyeDir.naturalWidth > 0 && blink < 0.999) {
                const eyeW = eyeSpc * _ep.wm * fs;
                const eyeMidY = eyeY - eyeW * _ep.vc + eyeW * 0.5;
                ctx.save();
                ctx.translate(0, eyeMidY);
                ctx.scale(1, 1 - blink);
                ctx.translate(0, -eyeMidY);
                ctx.drawImage(eyeDir, -eyeW / 2, eyeY - eyeW * _ep.vc, eyeW, eyeW);
                ctx.restore();
            } else if (blink >= 0.999) { /* fully closed — nothing drawn */ }
        } else {
            const eyeImg = custEyeImages[window.PLAYER_EYE_TYPE];
            if (eyeImg && eyeImg.complete && eyeImg.naturalWidth > 0) {
                const eyeW = eyeSpc * _ep.wm * fs;
                const eyeH = eyeW * custEyeAspect[window.PLAYER_EYE_TYPE];
                ctx.drawImage(eyeImg, -eyeW / 2, eyeY - eyeH * _ep.vc, eyeW, eyeH);
            } else {
                drawEye(-1); drawEye(1);
            }
        }

        // ── PNG mouth ────────────────────────────────────────────────────
        {
            const lt = window.PLAYER_LIP_TYPE;
            const m  = player.anim.mouth; // 0=closed → 1=open

            // Per-lip-type, per-state mouth position and size
            const _LP = {
                1: { idle: { cy: 25.5, size: 53  }, open: { cy: 37.9, size: 125 } },
                2: { idle: { cy: 25.0, size: 102 }, open: { cy: 36.5, size: 130 } },
                3: { idle: { cy: 13.5, size: 132 }, idle2: { cy: 13.5, size: 132 }, open: { cy: 37.9, size: 123 } },
            };
            const _lp  = _LP[lt] || _LP[1];
            const idleA = Math.max(0, 1 - m * 3.5);
            const openA = Math.min(1, m * 2);

            let openImg;
            if (lt === 2) { openImg = lip2Open; }
            else if (lt === 3) { openImg = lip3Open; }
            else { openImg = lip1Open; }

            ctx.save();

            // Idle frame(s)
            if (idleA > 0.01) {
                if (lt === 3) {
                    // LIP3: tongue lazily flips between idle1/idle2 each with its own position+size
                    const useIdle2 = (Math.floor(player.anim.time / 2) % 2 !== 0);
                    const lipState = useIdle2 ? (_lp.idle2 || _lp.idle) : _lp.idle;
                    const idleImg  = useIdle2 ? lip3Idle2 : lip3Idle1;
                    if (idleImg.complete && idleImg.naturalWidth > 0) {
                        const s = lipState.size * fs;
                        ctx.globalAlpha = idleA;
                        ctx.drawImage(idleImg, -s / 2, lipState.cy * fs - s * 0.5, s, s);
                    }
                } else {
                    const idleImg = lt === 2 ? lip2Idle : lip1Idle;
                    if (idleImg.complete && idleImg.naturalWidth > 0) {
                        const s = _lp.idle.size * fs;
                        ctx.globalAlpha = idleA;
                        ctx.drawImage(idleImg, -s / 2, _lp.idle.cy * fs - s * 0.5, s, s);
                    }
                }
            }

            // Open frame — starts at exported open.size, grows slightly with coverage
            if (openA > 0.01 && openImg.complete && openImg.naturalWidth > 0) {
                const gi = coveragePercent / 100;
                const openS = (_lp.open.size + gi * 25 + player.anim.gulp * 14) * fs;
                const wobble = m > 0.5 ? Math.sin(player.anim.time * 25) * 0.04 : 0;
                const openW  = openS * (1 - wobble);
                const openH  = openS * (1 + wobble);
                const openCy = _lp.open.cy * fs;
                ctx.globalAlpha = openA;
                ctx.drawImage(openImg, -openW / 2, openCy - openH * 0.5, openW, openH);
            }

            ctx.restore();
        }

        ctx.restore(); // face translate
        if (spotlightDanger) {
            const flkA = Math.max(0.08, 0.22 + Math.sin(globalFlickerPhase) * 0.11 + Math.sin(globalFlickerPhase * 1.7) * 0.07);
            const redGlow = ctx.createRadialGradient(player.x, player.y - 15, 0, player.x, player.y, player.baseR * 1.8);
            redGlow.addColorStop(0, `rgba(255, 20, 0, ${flkA})`);
            redGlow.addColorStop(0.6, `rgba(255, 0, 0, ${flkA * 0.4})`);
            redGlow.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            ctx.fillStyle = redGlow;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.baseR * 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
        // Swallow FX — perspective cone: item recedes into depth toward the mouth
        if (swallowFX.length > 0) {
            const _mx = player.x, _my = player.y + 46;
            swallowFX.forEach(fx => {
                const t = fx.t;
                const ease = t * t; // quadratic — gentle start, accelerates in

                // Curved path: item arcs slightly sideways before being pulled straight in
                // The arc direction is derived from the item's starting angle around the mouth
                const startAngle = Math.atan2(fx.y - _my, fx.x - _mx);
                const arcAmt = Math.sin(startAngle * 1.5) * 35 * Math.sin(t * Math.PI); // peaks mid-flight, zero at start/end
                const perpX = -Math.sin(startAngle), perpY = Math.cos(startAngle);
                const x = fx.x + (_mx - fx.x) * ease + perpX * arcAmt;
                const y = fx.y + (_my - fx.y) * ease + perpY * arcAmt;

                // Perspective recession: item appears to fall into a cone (z-depth shrink)
                // 1/(1+depth) gives natural perspective foreshortening, not a mechanical linear scale
                const depth = t * t * 7;
                const sc = 1 / (1 + depth);

                // Slow natural tumble — no forced axis alignment
                const spin = fx.rot + t * 1.1;

                ctx.save();
                ctx.globalAlpha = Math.max(0, 1 - t * t * 1.1);
                ctx.translate(x, y);
                ctx.rotate(spin);
                ctx.scale(sc, sc);
                draw3DItem(ctx, fx, 0, 0, false);
                ctx.restore();
            });
            ctx.globalAlpha = 1;
        }

        ctx.restore(); // camera
    } // end death / normal branch


    if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // Pearl mode: rays of light emanating from screen edges (halo composition)
    if (huntedTime > 0) {
        const t = player.anim.time;
        const fade = Math.min(1, huntedTime / 60);
        const W = canvas.width, H = canvas.height;
        const cx = W / 2, cy = H / 2;

        ctx.save();

        // Rays of light from edges — fine, iridescent, soft-edged
        const rayCount = IS_TOUCH ? 24 : 64;
        const baseHue = (t * 20) % 360;
        ctx.globalCompositeOperation = 'screen';

        for (let i = 0; i < rayCount; i++) {
            const angle = (i / rayCount) * Math.PI * 2;
            const driftAngle = angle + t * 0.012 + Math.sin(t * 1.5 + i * 0.8) * 0.03;

            const cosA = Math.cos(driftAngle);
            const sinA = Math.sin(driftAngle);

            // Edge intersection
            const tX = cosA !== 0 ? (cosA > 0 ? (W - cx) / cosA : -cx / cosA) : Infinity;
            const tY = sinA !== 0 ? (sinA > 0 ? (H - cy) / sinA : -cy / sinA) : Infinity;
            const tEdge = Math.min(Math.abs(tX), Math.abs(tY));
            const edgeX = cx + cosA * tEdge;
            const edgeY = cy + sinA * tEdge;

            const pulse = 0.4 + 0.4 * Math.sin(t * 2.5 + i * 2.1);
            const rayLen = tEdge * (0.3 + pulse * 0.25);
            const innerX = edgeX - cosA * rayLen;
            const innerY = edgeY - sinA * rayLen;

            // Iridescent colors — cycle through pink, cyan, gold, violet, green
            const hue = (baseHue + i * (360 / rayCount) + Math.sin(t * 1.2 + i) * 30) % 360;

            // Draw ray as a thin line with gradient stroke — no hard edges
            const grad = ctx.createLinearGradient(edgeX, edgeY, innerX, innerY);
            grad.addColorStop(0, `hsla(${hue}, 80%, 80%, ${fade * 1.0 * pulse})`);
            grad.addColorStop(0.15, `hsla(${(hue + 40) % 360}, 90%, 75%, ${fade * 0.7 * pulse})`);
            grad.addColorStop(0.5, `hsla(${(hue + 80) % 360}, 85%, 70%, ${fade * 0.3 * pulse})`);
            grad.addColorStop(1, `hsla(${(hue + 120) % 360}, 80%, 65%, 0)`);

            // Fine line stroke instead of triangle — no visible hard edges
            ctx.beginPath();
            ctx.moveTo(edgeX, edgeY);
            ctx.lineTo(innerX, innerY);
            ctx.strokeStyle = grad;
            ctx.lineWidth = (1.5 + 2.0 * pulse) * fade;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Even finer bright core with white-ish iridescent tint
            if (pulse > 0.5) {
                const coreA = fade * 0.7 * (pulse - 0.5) * 2;
                const coreGrad = ctx.createLinearGradient(edgeX, edgeY, innerX, innerY);
                coreGrad.addColorStop(0, `hsla(${(hue + 20) % 360}, 50%, 95%, ${coreA})`);
                coreGrad.addColorStop(0.4, `hsla(${(hue + 60) % 360}, 60%, 90%, ${coreA * 0.5})`);
                coreGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath();
                ctx.moveTo(edgeX, edgeY);
                ctx.lineTo(innerX, innerY);
                ctx.strokeStyle = coreGrad;
                ctx.lineWidth = 1.0 * fade;
                ctx.stroke();
            }
        }

        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();
    }

    // Draw hit splash particles (screen-space, centered on player screen pos)
    if (hitSplashes.length > 0) {
        const sx = canvas.width  / 2;
        const sy = canvas.height / 2;
        const originX = player.x, originY = player.y;
        const z = camera.zoom;

        ctx.save();
        hitSplashes.forEach(s => {
            const px = sx + (s.x - originX) * z;
            const py = sy + (s.y - originY) * z;
            const alpha = s.life;
            ctx.globalAlpha = alpha;
            
            if (s.type === 'ring') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = s.width * z;
                ctx.beginPath();
                ctx.arc(px, py, s.r * z, 0, Math.PI * 2);
                ctx.stroke();
            } else if (s.type === 'flash') {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(px, py, s.r * z * s.life, 0, Math.PI * 2);
                ctx.fill();
            } else if (s.type === 'spike') {
                ctx.fillStyle = '#ffffff';
                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(s.angle);
                ctx.beginPath();
                ctx.moveTo(0, -s.width/2 * s.life * z);
                ctx.lineTo(s.len * s.life * z, 0);
                ctx.lineTo(0, s.width/2 * s.life * z);
                ctx.fill();
                ctx.restore();
            } else if (s.type === 'debris') {
                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(s.rot);
                // Bold ink outline
                ctx.fillStyle = '#0d0d0d';
                ctx.fillRect(-s.size/2*z - 2, -s.size/2*z - 2, s.size*z + 4, s.size*z + 4);
                ctx.fillStyle = s.color;
                ctx.fillRect(-s.size/2*z, -s.size/2*z, s.size*z, s.size*z);
                ctx.restore();
            } else if (s.type === 'blob' || (s.r && !s.type)) {
                // Blob
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(px, py, (s.r || 5) * s.life * z, 0, Math.PI * 2);
                ctx.fill();
            } else if (s.type === 'sprite-explosion') {
                if (explosionSheet.complete && explosionSheet.naturalWidth > 0) {
                    const frame   = Math.min(8, Math.floor((1 - s.life) * 9));
                    const srcX    = frame * 1024;
                    const half    = s.size * 0.5;
                    // Fade out only on the last frame
                    ctx.globalAlpha = s.life < 0.18 ? s.life / 0.18 : 1;
                    ctx.drawImage(explosionSheet, srcX, 0, 1024, 1024,
                        px - half, py - half, s.size, s.size);
                }
                ctx.globalAlpha = alpha;

            } else if (s.type === 'anime-blast') {
                const p = 1 - s.life;
                const rawExpand = Math.pow(p, 0.22);
                const bounce = p < 0.12 ? 1 + Math.sin(p / 0.12 * Math.PI) * 0.18 : 1;
                const curR = s.r + (s.maxR - s.r) * rawExpand * bounce;
                const sc = curR * z;
                const spinAngle = s.rot + p * 1.5 * (1 - p * 0.5);
                const spikePhase = p * 16;
                const isSecondary = s.layer === 1;

                // Build jagged star — deep valleys (0.15) give dramatic silhouette
                // Spike tips wobble laterally for hand-drawn feel
                const buildStar = (radius) => {
                    ctx.beginPath();
                    const n = s.spikeCount;
                    for (let i = 0; i <= n * 2; i++) {
                        const ai = i % (n * 2);
                        const a = spinAngle + (ai / (n * 2)) * Math.PI * 2;
                        const isSpike = ai % 2 === 0;
                        const si = Math.floor(ai / 2) % n;
                        const pulse = isSpike
                            ? s.spikes[si] * (0.88 + 0.12 * Math.sin(spikePhase + si * 2.1))
                            : 0.15;
                        const r = radius * pulse;
                        const wob = (isSpike && s.wobble) ? s.wobble[si] * radius * 0.07 : 0;
                        const ptx = px + Math.cos(a) * r + Math.cos(a + Math.PI / 2) * wob;
                        const pty = py + Math.sin(a) * r + Math.sin(a + Math.PI / 2) * wob;
                        if (i === 0) ctx.moveTo(ptx, pty); else ctx.lineTo(ptx, pty);
                    }
                    ctx.closePath();
                };

                // Thick ink outline
                if (p < 0.88) {
                    ctx.globalAlpha = s.life * (isSecondary ? 0.45 : 0.92);
                    buildStar(sc * 1.10);
                    if (huntedTime > 0) {
                        const oH = (player.anim.time * 80 + p * 200 + 240) % 360;
                        ctx.fillStyle = `hsl(${oH}, 40%, 30%)`;
                    } else {
                        ctx.fillStyle = '#0d0d0d';
                    }
                    ctx.fill();
                }

                // Main colour fill
                ctx.globalAlpha = s.life * (isSecondary ? 0.42 : 0.88);
                buildStar(sc);
                if (huntedTime > 0) {
                    const bH = (player.anim.time * 80 + p * 200) % 360;
                    ctx.fillStyle = `hsl(${bH}, 72%, 68%)`;
                } else {
                    ctx.fillStyle = p < 0.25 ? '#ff9200' : p < 0.55 ? '#df3010' : '#7a180a';
                }
                ctx.fill();

                // Bright inner fill
                if (!isSecondary) {
                    ctx.globalAlpha = s.life * 0.95;
                    buildStar(sc * 0.50);
                    ctx.fillStyle = p < 0.20 ? '#ffffff' : p < 0.45 ? '#fff5a0' : '#ffbf00';
                    ctx.fill();
                }

                // Hot white core — only at very start
                if (p < 0.32 && !isSecondary) {
                    ctx.globalAlpha = s.life * (1 - p / 0.32);
                    ctx.beginPath();
                    ctx.arc(px, py, sc * 0.17, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                }

                ctx.globalAlpha = alpha;

            } else if (s.type === 'shockwave') {
                // Expanding ink ring — classic manga impact circle
                const p = 1 - s.life;
                const curR = s.maxR * Math.pow(p, 0.38) * z;
                if (curR > 1) {
                    ctx.globalAlpha = s.life * 0.72;
                    ctx.strokeStyle = '#111111';
                    ctx.lineWidth = Math.max(0.8, (2.8 - p * 2.0)) * z;
                    ctx.beginPath(); ctx.arc(px, py, curR, 0, Math.PI * 2); ctx.stroke();
                    ctx.strokeStyle = 'rgba(255,255,255,0.38)';
                    ctx.lineWidth = Math.max(0.5, (1.2 - p)) * z;
                    ctx.beginPath(); ctx.arc(px, py, curR * 0.94, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.globalAlpha = alpha;

            } else if (s.type === 'impact-flash') {
                ctx.globalAlpha = s.life * 0.88;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(px, py, s.r * s.life * z, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = alpha;

            } else if (s.type === 'ink-line') {
                // Tapered filled triangle — thick at base, needle tip
                const fade = Math.pow(s.life, 0.65);
                const len = s.len * Math.min(1, (1 - s.life) * 4) * fade * z;
                if (len > 1) {
                    const bw = s.baseWidth * fade * z * 0.5;
                    const tipX = px + Math.cos(s.angle) * len;
                    const tipY = py + Math.sin(s.angle) * len;
                    const perpX = -Math.sin(s.angle) * bw;
                    const perpY =  Math.cos(s.angle) * bw;
                    ctx.globalAlpha = fade * 0.88;
                    // Ink outline slightly wider
                    ctx.fillStyle = '#111111';
                    ctx.beginPath();
                    ctx.moveTo(px + perpX * 1.25, py + perpY * 1.25);
                    ctx.lineTo(tipX, tipY);
                    ctx.lineTo(px - perpX * 1.25, py - perpY * 1.25);
                    ctx.closePath(); ctx.fill();
                    // White/yellow core
                    ctx.fillStyle = s.life > 0.55 ? '#ffffff' : '#ffe080';
                    ctx.beginPath();
                    ctx.moveTo(px + perpX, py + perpY);
                    ctx.lineTo(tipX, tipY);
                    ctx.lineTo(px - perpX, py - perpY);
                    ctx.closePath(); ctx.fill();
                }
                ctx.globalAlpha = alpha;

            } else if (s.type === 'impact-mark') {
                // Small angular dashes that radiate outward at mid-distance
                const p = 1 - s.life;
                const burstR = 255 * Math.pow(p, 0.28) * s.dist * z;
                const markX = px + Math.cos(s.angle) * burstR;
                const markY = py + Math.sin(s.angle) * burstR;
                const len = 22 * s.life * z;
                const w  =  5 * s.life * z;
                if (len > 1) {
                    ctx.globalAlpha = s.life * 0.82;
                    ctx.save();
                    ctx.translate(markX, markY);
                    ctx.rotate(s.angle);
                    ctx.fillStyle = '#111111';
                    ctx.fillRect(-w * 0.5, -len * 0.5, w, len);
                    ctx.restore();
                }
                ctx.globalAlpha = alpha;

            } else if (s.type === 'speed-line') {
                // Legacy — kept for any old particles still alive
                ctx.globalAlpha = s.life * 0.6;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = (s.width || 3) * s.life * z;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px + Math.cos(s.angle) * (s.len || 80) * s.life * z,
                           py + Math.sin(s.angle) * (s.len || 80) * s.life * z);
                ctx.stroke();
                ctx.globalAlpha = alpha;
            } else {
                // Streak line
                const ex = px - (s.vx / (Math.hypot(s.vx, s.vy) || 1)) * s.len * s.life * z;
                const ey = py - (s.vy / (Math.hypot(s.vx, s.vy) || 1)) * s.len * s.life * z;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = s.width * s.life * z;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(ex, ey);
                ctx.stroke();
            }
        });
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    // ── EDGE DANGER INDICATORS — arrows on screen border for off-screen enemies ──
    if (winPhase === 0 && enemies.length > 0) {
        const now_s = performance.now() * 0.001;
        const cW = canvas.width, cH = canvas.height;
        const margin = 28;
        ctx.save();
        enemies.forEach(en => {
            const sx = (en.x - camera.x) * camera.zoom + cW / 2;
            const sy = (en.y - camera.y) * camera.zoom + cH / 2;
            if (sx >= margin && sx <= cW - margin && sy >= margin && sy <= cH - margin) return;
            const dx = sx - cW / 2, dy = sy - cH / 2;
            const d = Math.hypot(dx, dy);
            if (d < 1) return;
            const t = Math.min((cW / 2 - margin) / Math.abs(dx), (cH / 2 - margin) / Math.abs(dy));
            const ex = cW / 2 + dx * t, ey = cH / 2 + dy * t;
            const pulse = 0.5 + 0.5 * Math.sin(now_s * 5.0 + en.floatOffset);
            const sz = 7 + pulse * 3;
            ctx.save();
            ctx.translate(ex, ey);
            ctx.rotate(Math.atan2(dy, dx));
            ctx.globalAlpha = 0.55 + pulse * 0.35;
            // Glow halo
            const gG = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 2.2);
            gG.addColorStop(0,   `rgba(255,80,80,${0.35 * (0.5 + pulse * 0.5)})`);
            gG.addColorStop(1,   'rgba(255,80,80,0)');
            ctx.fillStyle = gG;
            ctx.beginPath(); ctx.arc(0, 0, sz * 2.2, 0, Math.PI * 2); ctx.fill();
            // Arrow triangle
            ctx.fillStyle = `rgb(255,${Math.round(70 + pulse * 30)},70)`;
            ctx.beginPath();
            ctx.moveTo(sz, 0);
            ctx.lineTo(-sz * 0.55, -sz * 0.58);
            ctx.lineTo(-sz * 0.55,  sz * 0.58);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        });
        ctx.restore();
    }

    // Touch joystick — base ring + knob
    if (IS_TOUCH && touchJoystick.active) {
        const bx = touchJoystick.baseX, by = touchJoystick.baseY;
        const dx = touchJoystick.knobX - bx, dy = touchJoystick.knobY - by;
        const dist = Math.hypot(dx, dy);
        const clamp = Math.min(dist, JOYSTICK_RADIUS);
        const kx = dist > 0 ? bx + (dx / dist) * clamp : bx;
        const ky = dist > 0 ? by + (dy / dist) * clamp : by;

        ctx.save();

        // Base outer ring
        ctx.beginPath();
        ctx.arc(bx, by, JOYSTICK_RADIUS, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Base fill
        ctx.beginPath();
        ctx.arc(bx, by, JOYSTICK_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fill();

        // Knob
        ctx.beginPath();
        ctx.arc(kx, ky, 22, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.28)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(kx, ky, 22, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.restore();
    }

}

// ─────────────────────────────────────────────
// WIN SCREEN ANIMATION
// ─────────────────────────────────────────────
let _winRAF = null;
let _winT = 0;
let _winPrevTs = 0;
let _winStage = 1;
let _winRaySeeds = null; // generated once per win screen open
let _winGemEnterT = 0;  // 0→1 over GEM_ENTER_DUR seconds

const GEM_ENTER_DUR = 1.1; // seconds for gem entrance

// easeOutBack — overshoots then snaps back, gives a gem-drop feel
function _easeOutBack(x) {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
}

const _winStars = Array.from({ length: 55 }, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.4 + Math.random() * 1.4,
    phase: Math.random() * Math.PI * 2,
    spd: 0.4 + Math.random() * 1.1
}));

function _drawWinSparkle(ctx, x, y, size, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
        const a = i * Math.PI / 2 - Math.PI / 4;
        ctx.lineTo(Math.cos(a) * size * 0.28, Math.sin(a) * size * 0.28);
        const a2 = a + Math.PI / 4;
        ctx.lineTo(Math.cos(a2) * size, Math.sin(a2) * size);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function _drawWinGemPolygons(ctx, stageNum, cx, cy, targetSize, rotation) {
    const gem = NECKLACE_GEMS[((stageNum - 1) + NECKLACE_GEMS.length) % NECKLACE_GEMS.length];
    if (!gem || !gem.polygons) return;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    gem.polygons.forEach(poly => {
        poly.pts.split(' ').forEach(p => {
            const [x, y] = p.split(',').map(Number);
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
        });
    });
    const bW = maxX - minX, bH = maxY - minY;
    const sc2 = (targetSize * 2) / Math.max(bW, bH);
    const bCX = (minX + maxX) / 2, bCY = (minY + maxY) / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);
    ctx.shadowColor = gem.polygons[0].fill;
    ctx.shadowBlur = 22;
    gem.polygons.forEach(poly => {
        const pts = poly.pts.split(' ').map(p => { const [x, y] = p.split(',').map(Number); return [(x - bCX) * sc2, (y - bCY) * sc2]; });
        ctx.beginPath();
        pts.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
        ctx.closePath();
        ctx.fillStyle = poly.fill;
        ctx.fill();
    });
    // Highlight flare on top facets
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = 'white';
    gem.polygons.slice(0, Math.min(3, gem.polygons.length)).forEach(poly => {
        const pts = poly.pts.split(' ').map(p => { const [x, y] = p.split(',').map(Number); return [(x - bCX) * sc2, (y - bCY) * sc2]; });
        ctx.beginPath();
        pts.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
        ctx.closePath(); ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.restore();
}

function _drawWinFace(ctx, r) {
    const sc = r / 110;
    const fs = 1.1;
    const et = window.PLAYER_EYE_TYPE;
    const _EP2 = [
        { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 },
        { spc: 90.0, y: -29.5, r: 36.0, wm: 1.70, vc: 0.50 },
        { spc: 90.0, y: -34.0, r: 36.0, wm: 1.70, vc: 0.50 },
        { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 },
        { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 },
        { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 },
        { spc: 35.0, y: -35.0, r: 33.0, wm: 1.70, vc: 0.50 },
        { spc: 73.6, y: -45.6, r: 36.0, wm: 1.70, vc: 0.50 },
    ];
    const ep2 = _EP2[et] || _EP2[0];
    const eyeSpc = ep2.spc * fs * sc;
    const eyeY   = ep2.y  * fs * sc;
    const eyeR   = ep2.r  * fs * sc;
    if (et === 7) {
        if (eye2Idle.complete && eye2Idle.naturalWidth > 0) {
            const eyeW = eyeSpc * ep2.wm * fs;
            ctx.drawImage(eye2Idle, -eyeW / 2, eyeY - eyeW * ep2.vc, eyeW, eyeW);
        }
    } else if (et === 6) {
        [-1, 1].forEach(side => {
            ctx.save(); ctx.translate(side * eyeSpc, eyeY);
            ctx.beginPath(); ctx.ellipse(0, 0, eyeR, eyeR * 1.227, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.clip();
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath(); ctx.ellipse(0, eyeR * 0.219, eyeR * 0.927, eyeR * 1.028, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(eyeR * 0.353, -eyeR * 0.491, eyeR * 0.174, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(eyeR * 0.564,  eyeR * 0.004, eyeR * 0.290, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });
    } else if (et === 0) {
        [-1, 1].forEach(side => {
            ctx.save(); ctx.translate(side * eyeSpc, eyeY);
            ctx.beginPath(); ctx.arc(0, 0, eyeR, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.clip();
            ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(0, 0, eyeR * 0.9, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(-eyeR * 0.4, -eyeR * 0.4, eyeR * 0.35, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-eyeR * 0.1, -eyeR * 0.6, eyeR * 0.15, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });
    } else {
        const eyeImg = custEyeImages[et];
        if (eyeImg && eyeImg.complete && eyeImg.naturalWidth > 0) {
            const eyeW = eyeSpc * ep2.wm * fs;
            const eyeH = eyeW * custEyeAspect[et];
            ctx.drawImage(eyeImg, -eyeW / 2, eyeY - eyeH * ep2.vc, eyeW, eyeH);
        }
    }
    const lt = window.PLAYER_LIP_TYPE;
    const _LP2 = { 1: { cy: 25.5, size: 53 }, 2: { cy: 25.0, size: 102 }, 3: { cy: 13.5, size: 132 } };
    const lp2 = _LP2[lt] || _LP2[1];
    const idleImg = lt === 2 ? lip2Idle : lt === 3 ? lip3Idle1 : lip1Idle;
    if (idleImg && idleImg.complete && idleImg.naturalWidth > 0) {
        const idleS = lp2.size * fs * sc;
        const cy    = lp2.cy  * fs * sc;
        ctx.drawImage(idleImg, -idleS / 2, cy - idleS * 0.5, idleS, idleS);
    }
}

function _drawWinFrame(ts) {
    if (!_winRAF) return;
    const dt = Math.min(3, (ts - _winPrevTs) / 16.667);
    _winPrevTs = ts;
    _winT += dt * 0.016;
    _winGemEnterT = Math.min(1, _winGemEnterT + (dt * 0.016) / GEM_ENTER_DUR);
    const t = _winT;

    const canvas = document.getElementById('win-anim-canvas');
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || window.innerWidth;
    const H = canvas.offsetHeight || window.innerHeight;
    if (canvas.width !== Math.round(W * dpr)) { canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr); }
    const c = canvas.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    c.clearRect(0, 0, W, H);

    const charCX  = W * 0.5;
    const charR   = Math.min(W * 0.21, H * 0.12, 88);
    const groundY = H * 0.70;

    // Hop
    const bounce = Math.sin(t * 3.8);
    const inAir  = Math.max(0, bounce);
    const charY  = groundY - inAir * charR * 0.65;
    const sqX    = 1 + (bounce < 0 ? -bounce * 0.10 : 0) - inAir * 0.05;
    const sqY    = 1 - (bounce < 0 ? -bounce * 0.07 : 0) + inAir * 0.10;

    // ── GEM — independent float, not tied to character hop ──
    const gemSize = charR * 1.15;
    // Dual-wave gentle float: slow drift + tiny wobble
    const gemBob  = Math.sin(t * 0.9) * 6 + Math.sin(t * 1.7 + 1.1) * 2.5;
    const gemRot  = Math.sin(t * 0.8) * 0.12 + Math.sin(t * 1.9 + 0.4) * 0.04;
    // Fixed vertical anchor (not charY) so gem doesn't hop with the body
    const gemAnchorY = groundY - charR * 2.0 - gemSize * 0.9;

    // Entrance animation — gem drops from above with spring overshoot
    const enterEased = _easeOutBack(_winGemEnterT);
    const enterDropOffset = (1 - _winGemEnterT) * (-H * 0.28); // falls from above
    const enterScale  = 0.2 + 0.8 * enterEased;                // scales up
    const enterAlpha  = Math.min(1, _winGemEnterT * 2.5);       // quick fade-in
    const raysAlpha   = Math.min(1, Math.max(0, _winGemEnterT * 1.8 - 0.3)); // rays lag slightly

    const gemY = gemAnchorY + gemBob + enterDropOffset;

    const baseHue = (t * 38) % 360;

    // Per-ray seed values for organic variety (computed once, stable)
    // Use golden-angle-ish irrational spacing for natural-looking size distribution
    const RAY_COUNT = 56;
    const _raySeeds = _winRaySeeds || (_winRaySeeds = Array.from({length: RAY_COUNT}, (_, i) => ({
        lenMult:   0.5 + ((i * 0.618033) % 1) * 2.2,   // 0.5 → 2.7  (wide spread of lengths)
        widthMult: 0.4 + ((i * 0.381966) % 1) * 1.8,   // 0.4 → 2.2  (varied widths)
        pulseSeed: Math.random() * Math.PI * 2,
        pulseSpd:  1.6 + Math.random() * 2.2,
    })));

    // Pearl-mode iridescent halo rays — organic sizes via per-ray seeds
    c.save();
    c.globalAlpha = raysAlpha;
    c.globalCompositeOperation = 'screen';
    for (let i = 0; i < RAY_COUNT; i++) {
        const seed       = _raySeeds[i];
        const angle      = (i / RAY_COUNT) * Math.PI * 2;
        const driftAngle = angle + t * 0.013 + Math.sin(t * 1.4 + i * 0.82) * 0.04;
        const cosA = Math.cos(driftAngle), sinA = Math.sin(driftAngle);
        const pulse  = 0.35 + 0.45 * Math.sin(t * seed.pulseSpd + seed.pulseSeed);
        const rayLen = gemSize * seed.lenMult * (0.7 + pulse * 0.9);
        const startX = charCX + cosA * gemSize * 0.40;
        const startY = gemY   + sinA * gemSize * 0.40;
        const endX   = charCX + cosA * (gemSize * 0.40 + rayLen);
        const endY   = gemY   + sinA * (gemSize * 0.40 + rayLen);
        const hue    = (baseHue + i * (360 / RAY_COUNT) + Math.sin(t * 1.1 + i) * 40) % 360;
        const alpha  = pulse * seed.widthMult * 0.55;
        const grad   = c.createLinearGradient(startX, startY, endX, endY);
        grad.addColorStop(0,    `hsla(${hue},              85%, 82%, ${Math.min(1, alpha * 1.6)})`);
        grad.addColorStop(0.15, `hsla(${(hue+40)%360},     90%, 76%, ${Math.min(1, alpha * 1.1)})`);
        grad.addColorStop(0.50, `hsla(${(hue+80)%360},     85%, 70%, ${alpha * 0.45})`);
        grad.addColorStop(1,    `hsla(${(hue+120)%360},    80%, 65%, 0)`);
        c.beginPath();
        c.moveTo(startX, startY);
        c.lineTo(endX, endY);
        c.strokeStyle = grad;
        c.lineWidth   = seed.widthMult * (0.6 + 1.6 * pulse);
        c.lineCap     = 'round';
        c.stroke();
        // Bright core on the wider rays
        if (pulse > 0.5 && seed.widthMult > 1.1) {
            const coreA = (pulse - 0.5) * seed.widthMult * 0.8;
            const coreG = c.createLinearGradient(startX, startY, endX, endY);
            coreG.addColorStop(0,    `hsla(${(hue+20)%360}, 50%, 96%, ${coreA})`);
            coreG.addColorStop(0.30, `hsla(${(hue+60)%360}, 60%, 92%, ${coreA * 0.35})`);
            coreG.addColorStop(1,    'rgba(255,255,255,0)');
            c.beginPath(); c.moveTo(startX, startY); c.lineTo(endX, endY);
            c.strokeStyle = coreG; c.lineWidth = seed.widthMult * 0.55; c.stroke();
        }
    }
    c.globalCompositeOperation = 'source-over';
    c.globalAlpha = 1;
    c.restore();

    // Gem polygons — scaled + faded by entrance animation
    c.save();
    c.globalAlpha = enterAlpha;
    c.translate(charCX, gemY);
    c.scale(enterScale, enterScale);
    c.translate(-charCX, -gemY);
    _drawWinGemPolygons(c, _winStage, charCX, gemY, gemSize, gemRot);
    c.restore();

    // Gem glare — multiple physically-based specular spots at distinct facet positions
    // Each: bloom radius, hot-spot radius, pulse speed/phase, optional streak + prism fringe
    c.save();
    c.globalAlpha = enterAlpha;
    const _glareSpots = [
        // Main table facet — largest bloom, slightly left of centre, near top
        { ox: -0.06, oy: -0.32, bloom: 0.30, spot: 0.062, peak: 0.88, spd: 1.7, ph: 0.0,
          streak: true,  sa: -0.62, sl: 0.38, fringe: true  },
        // Left crown facet — mid-size, lower-left
        { ox: -0.28, oy: -0.16, bloom: 0.17, spot: 0.040, peak: 0.64, spd: 2.3, ph: 1.3,
          streak: true,  sa:  0.45, sl: 0.22, fringe: false },
        // Right crown facet — slightly smaller, lower-right
        { ox:  0.22, oy: -0.19, bloom: 0.13, spot: 0.030, peak: 0.52, spd: 1.9, ph: 2.1,
          streak: true,  sa: -1.10, sl: 0.17, fringe: false },
        // Star glint — tiny pinpoint high up, fast pulse
        { ox:  0.08, oy: -0.44, bloom: 0.08, spot: 0.018, peak: 0.95, spd: 3.2, ph: 0.8,
          streak: false, sa:  0.00, sl: 0.00, fringe: false },
    ];
    for (const gs of _glareSpots) {
        const gx    = charCX + gemSize * gs.ox;
        const gy    = gemY   + gemSize * gs.oy;
        const pulse = 0.50 + 0.50 * Math.sin(t * gs.spd + gs.ph);

        // Soft outer bloom
        const bR = gemSize * gs.bloom;
        const bG = c.createRadialGradient(gx, gy, 0, gx, gy, bR);
        bG.addColorStop(0,   `rgba(255,255,255,${0.20 * pulse * gs.peak})`);
        bG.addColorStop(0.5, `rgba(200,230,255,${0.09 * pulse * gs.peak})`);
        bG.addColorStop(1,   'rgba(255,255,255,0)');
        c.fillStyle = bG;
        c.beginPath(); c.arc(gx, gy, bR, 0, Math.PI * 2); c.fill();

        // Tight specular hot-spot
        const sR = gemSize * gs.spot;
        const sG = c.createRadialGradient(gx, gy, 0, gx, gy, sR);
        sG.addColorStop(0,   `rgba(255,255,255,${gs.peak * pulse})`);
        sG.addColorStop(0.4, `rgba(235,248,255,${gs.peak * pulse * 0.55})`);
        sG.addColorStop(1,   'rgba(255,255,255,0)');
        c.fillStyle = sG;
        c.beginPath(); c.arc(gx, gy, sR, 0, Math.PI * 2); c.fill();

        // Facet streak
        if (gs.streak) {
            const sLen = gemSize * gs.sl;
            const sc2 = Math.cos(gs.sa), ss2 = Math.sin(gs.sa);
            const sx0 = gx - sc2 * sLen * 0.35, sy0 = gy - ss2 * sLen * 0.35;
            const sx1 = gx + sc2 * sLen * 0.65, sy1 = gy + ss2 * sLen * 0.65;
            const stG = c.createLinearGradient(sx0, sy0, sx1, sy1);
            stG.addColorStop(0,    'rgba(255,255,255,0)');
            stG.addColorStop(0.25, `rgba(255,255,255,${0.45 * pulse * gs.peak})`);
            stG.addColorStop(0.55, `rgba(225,242,255,${0.65 * pulse * gs.peak})`);
            stG.addColorStop(0.80, `rgba(255,255,255,${0.22 * pulse * gs.peak})`);
            stG.addColorStop(1,    'rgba(255,255,255,0)');
            c.beginPath(); c.moveTo(sx0, sy0); c.lineTo(sx1, sy1);
            c.strokeStyle = stG; c.lineWidth = 1.3; c.lineCap = 'round'; c.stroke();
        }

        // Prism fringe (main table spot only)
        if (gs.fringe) {
            const fY = gy + sR * 1.8;
            const fG = c.createLinearGradient(gx - sR * 2.2, fY, gx + sR * 2.2, fY);
            fG.addColorStop(0,    'rgba(255,80,80,0)');
            fG.addColorStop(0.25, `rgba(255,160,80,${0.24 * pulse})`);
            fG.addColorStop(0.50, `rgba(80,200,255,${0.30 * pulse})`);
            fG.addColorStop(0.75, `rgba(180,80,255,${0.24 * pulse})`);
            fG.addColorStop(1,    'rgba(255,80,200,0)');
            c.fillStyle = fG;
            c.fillRect(gx - sR * 2.2, fY - 1.5, sR * 4.4, 3.2);
        }
    }
    c.restore();

    // Sparkle stars around gem
    c.save(); c.globalAlpha = raysAlpha;
    for (let i = 0; i < 5; i++) {
        const a    = t * 1.7 + i * (Math.PI * 2 / 5);
        const dist = gemSize * (1.0 + 0.18 * Math.sin(t * 2.2 + i * 1.4));
        const sx2  = charCX + Math.cos(a) * dist;
        const sy2  = gemY   + Math.sin(a) * dist * 0.5;
        const ss   = 1.8 + Math.sin(t * 3.8 + i * 2.1) * 1.3;
        if (ss < 0.4) continue;
        const sa = 0.4 + 0.6 * Math.abs(Math.sin(t * 2.9 + i));
        _drawWinSparkle(c, sx2, sy2, ss, `hsla(${(baseHue + i * 72) % 360}, 90%, 88%, ${sa})`);
    }
    c.restore();

    // ── Floor caustic + mirror reflection ──────────────────────────────
    // Floor must be BELOW the character's bottom edge (groundY + charR)
    // so the reflection isn't painted behind the character and hidden.
    const floorY = groundY + charR * 1.05;

    // Mirror reflection — perspective-compressed to simulate a glossy floor at a grazing angle.
    // kRef < 0.5 squishes everything vertically, bringing the high gem into the visible area
    // and creating the natural foreshortening you'd see in a real reflective surface.
    const kRef = 0.28;
    // A point drawn at canvas y appears on screen at: floorY*(1+kRef) - kRef*y
    c.save();
    c.globalAlpha = enterAlpha * 0.50;
    c.beginPath(); c.rect(0, floorY, W, H - floorY); c.clip();
    c.translate(0, floorY * (1 + kRef)); c.scale(1, -kRef);

    // Reflected gem (same entrance scale/rotation, appears squished on floor)
    c.save();
    c.translate(charCX, gemY); c.scale(enterScale, enterScale); c.translate(-charCX, -gemY);
    _drawWinGemPolygons(c, _winStage, charCX, gemY, gemSize, -gemRot);
    c.restore();

    // Reflected arms
    const _rAL = inAir * 0.55 + 0.15;
    [-1, 1].forEach(side => {
        const bAng = side > 0 ? -Math.PI * 0.55 : -Math.PI * 0.45;
        const aAng = bAng - side * _rAL * 0.35;
        const ax2  = charCX + Math.cos(aAng) * charR * 0.92 * sqX;
        const ay2  = charY  + Math.sin(aAng) * charR * 0.60 * sqY;
        c.save();
        c.translate(ax2, ay2);
        c.rotate(aAng + (side > 0 ? 0.2 : -0.2) - _rAL * side * 0.4);
        const rAG = c.createRadialGradient(-7, -5, 1, 0, 0, 20);
        rAG.addColorStop(0, hexToRgba(window.PLAYER_COLOR, 1));
        rAG.addColorStop(1, hexToRgba(window.PLAYER_COLOR, 0.7));
        c.fillStyle = rAG;
        c.beginPath(); c.ellipse(0, 0, 20, 13, 0, 0, Math.PI * 2); c.fill();
        c.restore();
    });

    // Reflected body
    c.save();
    c.translate(charCX, charY); c.scale(sqX, sqY);
    const rBG = c.createRadialGradient(-charR*0.28, -charR*0.32, charR*0.04, charR*0.08, charR*0.08, charR*1.18);
    rBG.addColorStop(0,    hexToRgba(window.PLAYER_COLOR, 1));
    rBG.addColorStop(0.55, hexToRgba(window.PLAYER_COLOR, 0.9));
    rBG.addColorStop(1,    hexToRgba(window.PLAYER_COLOR, 0.72));
    c.fillStyle = rBG;
    c.beginPath(); c.arc(0, 0, charR, 0, Math.PI * 2); c.fill();
    const rHL = c.createRadialGradient(-charR*0.30, -charR*0.36, 3, -charR*0.10, -charR*0.14, charR*0.72);
    rHL.addColorStop(0,    'rgba(255,255,255,0.52)');
    rHL.addColorStop(0.42, 'rgba(255,255,255,0.12)');
    rHL.addColorStop(1,    'rgba(255,255,255,0)');
    c.fillStyle = rHL;
    c.beginPath(); c.arc(0, 0, charR, 0, Math.PI * 2); c.fill();
    c.restore();

    // Reflected face (appears upside-down due to y-flip — correct for a floor mirror)
    c.save();
    c.translate(charCX, charY); c.scale(sqX, sqY);
    _drawWinFace(c, charR);
    c.restore();

    c.restore(); // end perspective flip + clip

    // Fade reflection into the black background
    c.save();
    const reflFade = c.createLinearGradient(0, floorY, 0, floorY + charR * 3.0);
    reflFade.addColorStop(0,    'rgba(0,0,0,0)');
    reflFade.addColorStop(0.20, 'rgba(0,0,0,0.10)');
    reflFade.addColorStop(0.65, 'rgba(0,0,0,0.65)');
    reflFade.addColorStop(1,    'rgba(0,0,0,1)');
    c.fillStyle = reflFade;
    c.fillRect(0, floorY, W, charR * 3.0);
    c.restore();
    // ───────────────────────────────────────────────────────────────────

    // Ground shadow
    c.save();
    c.translate(charCX, groundY + 4);
    c.scale(1 - inAir * 0.4, 0.18);
    const shG = c.createRadialGradient(0, 0, 2, 0, 0, charR * 1.1);
    shG.addColorStop(0, `rgba(255,255,255,${0.12 - inAir * 0.08})`);
    shG.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = shG; c.beginPath(); c.arc(0, 0, charR * 1.1, 0, Math.PI * 2); c.fill();
    c.restore();

    // Arms
    const armLift = inAir * 0.55 + 0.15;
    [-1, 1].forEach(side => {
        const baseAngle = side > 0 ? -Math.PI * 0.55 : -Math.PI * 0.45;
        const armAng    = baseAngle - side * armLift * 0.35;
        const ax = charCX + Math.cos(armAng) * charR * 0.92 * sqX;
        const ay = charY  + Math.sin(armAng) * charR * 0.60 * sqY;
        c.save();
        c.translate(ax, ay);
        c.rotate(armAng + (side > 0 ? 0.2 : -0.2) - armLift * side * 0.4);
        const armG = c.createRadialGradient(-7, -5, 1, 0, 0, 20);
        armG.addColorStop(0, hexToRgba(window.PLAYER_COLOR, 1));
        armG.addColorStop(1, hexToRgba(window.PLAYER_COLOR, 0.7));
        c.fillStyle = armG;
        c.beginPath(); c.ellipse(0, 0, 20, 13, 0, 0, Math.PI * 2); c.fill();
        c.restore();
    });

    // Body
    c.save();
    c.translate(charCX, charY);
    c.scale(sqX, sqY);
    const bodyG = c.createRadialGradient(-charR * 0.28, -charR * 0.32, charR * 0.04, charR * 0.08, charR * 0.08, charR * 1.18);
    bodyG.addColorStop(0,    hexToRgba(window.PLAYER_COLOR, 1));
    bodyG.addColorStop(0.55, hexToRgba(window.PLAYER_COLOR, 0.9));
    bodyG.addColorStop(1,    hexToRgba(window.PLAYER_COLOR, 0.72));
    c.fillStyle = bodyG;
    c.beginPath(); c.arc(0, 0, charR, 0, Math.PI * 2); c.fill();
    const hlG = c.createRadialGradient(-charR * 0.30, -charR * 0.36, 3, -charR * 0.10, -charR * 0.14, charR * 0.72);
    hlG.addColorStop(0,    'rgba(255,255,255,0.52)');
    hlG.addColorStop(0.42, 'rgba(255,255,255,0.12)');
    hlG.addColorStop(1,    'rgba(255,255,255,0)');
    c.fillStyle = hlG;
    c.beginPath(); c.arc(0, 0, charR, 0, Math.PI * 2); c.fill();
    c.restore();

    // Face
    c.save();
    c.translate(charCX, charY);
    c.scale(sqX, sqY);
    _drawWinFace(c, charR);
    c.restore();

    _winRAF = requestAnimationFrame(_drawWinFrame);
}

function startWinAnim(stageNum) {
    _winStage      = stageNum || 1;
    _winT          = 0;
    _winPrevTs     = performance.now();
    _winRaySeeds   = null;
    _winGemEnterT  = 0;
    if (_winRAF) cancelAnimationFrame(_winRAF);
    _winRAF = requestAnimationFrame(_drawWinFrame);
    // Fanfare plays as gem lands (easeOutBack peak is at ~80% of duration)
    setTimeout(sfxWinFanfare, GEM_ENTER_DUR * 800);
}

function stopWinAnim() {
    if (_winRAF) { cancelAnimationFrame(_winRAF); _winRAF = null; }
}

const CUST_COLORS = [
    '#ff83df', '#8dc1ff', '#00edc5', '#e5af83', '#684f4b',
    '#ce4949', '#fffb73', '#c4cbce', '#ab76ff', '#4b4b4c'
];

// LIP DRAWING
// ─────────────────────────────────────────────

function drawLipstick(ctx, fs) {
    const ly = 15 * fs, lw = 25 * fs;
    // Lower lip — full and pouty
    const lg = ctx.createRadialGradient(0, ly + 4*fs, fs, 0, ly, 10*fs);
    lg.addColorStop(0, '#ff4070'); lg.addColorStop(1, '#b00030');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.moveTo(-lw, ly);
    ctx.quadraticCurveTo(0, ly + 12*fs, lw, ly);
    ctx.closePath(); ctx.fill();
    // Upper lip — Cupid's bow
    ctx.fillStyle = '#c0002a';
    ctx.beginPath();
    ctx.moveTo(-lw, ly);
    ctx.quadraticCurveTo(-lw * 0.5, ly - 8*fs, 0, ly - 2*fs);
    ctx.quadraticCurveTo(lw * 0.5, ly - 8*fs, lw, ly);
    ctx.closePath(); ctx.fill();
    // Philtrum dip
    ctx.fillStyle = '#8c001a';
    ctx.beginPath();
    ctx.moveTo(-lw * 0.22, ly - 6*fs);
    ctx.quadraticCurveTo(0, ly - 1*fs, lw * 0.22, ly - 6*fs);
    ctx.closePath(); ctx.fill();
    // Highlight on lower lip
    ctx.fillStyle = 'rgba(255, 200, 215, 0.38)';
    ctx.beginPath();
    ctx.ellipse(-lw * 0.28, ly + 4*fs, lw * 0.2, 2.5*fs, -0.15, 0, Math.PI * 2);
    ctx.fill();
}

function drawAnimeLips(ctx, fs) {
    const ly = 15 * fs, lw = 18 * fs;
    // Main curve - thick and visible
    ctx.strokeStyle = 'rgb(110, 55, 55)';
    ctx.lineWidth = 5 * fs; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-lw, ly);
    ctx.quadraticCurveTo(0, ly + 4*fs, lw, ly);
    ctx.stroke();
    // Lower lip hint
    ctx.strokeStyle = 'rgba(150, 90, 90, 0.55)';
    ctx.lineWidth = 3 * fs;
    ctx.beginPath();
    ctx.moveTo(-lw * 0.45, ly + 5*fs);
    ctx.quadraticCurveTo(0, ly + 8*fs, lw * 0.45, ly + 5*fs);
    ctx.stroke();
}

// ─────────────────────────────────────────────

function switchTab(tabIndex) {
    document.querySelectorAll('.nav-item').forEach((d, i) => {
        if (i === tabIndex) d.classList.add('active');
        else d.classList.remove('active');
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tabIndex).classList.add('active');
}

// Draws the character face on a canvas using the exact same coordinates as the game.
// Uses ctx.scale(r/80) so all drawing uses game-exact fs=1.1 coordinates —
// guarantees pixel-perfect proportional match at any canvas size.
function renderPreviewFace(canvas) {
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const css = canvas.offsetWidth || canvas.parentElement?.offsetWidth || 120;
    if (canvas.width !== css * dpr) {
        canvas.width  = css * dpr;
        canvas.height = css * dpr;
    }
    const c = canvas.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    c.clearRect(0, 0, css, css);

    const r  = css / 2;
    const sc = r / 110;  // scale from game space (player.baseR=110) to canvas space

    c.save();
    c.translate(r, r);   // face centre
    c.scale(sc, sc);     // everything drawn below is in game-exact pixel coordinates

    // Game constants at game-start (coveragePercent=0, puff=0)
    const fs   = 1.1;
    const _EP2 = [
        { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 }, // 0 default
        { spc: 90.0, y: -29.5, r: 36.0, wm: 1.70, vc: 0.50 }, // 1 goggles
        { spc: 90.0, y: -34.0, r: 36.0, wm: 1.70, vc: 0.50 }, // 2 cute
        { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 }, // 3 (fallback)
        { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 }, // 4 (fallback)
        { spc: 35.5, y: -43.0, r: 31.5, wm: 1.70, vc: 0.50 }, // 5 (fallback)
        { spc: 35.0, y: -35.0, r: 33.0, wm: 1.70, vc: 0.50 }, // 6 anime
        { spc: 73.6, y: -45.6, r: 36.0, wm: 1.70, vc: 0.50 }, // 7 eye2 png
    ];
    const _ep2   = _EP2[window.PLAYER_EYE_TYPE] || _EP2[0];
    const eyeSpc = _ep2.spc * fs;
    const eyeY   = _ep2.y * fs;
    const eyeR   = _ep2.r * fs;

    const et = window.PLAYER_EYE_TYPE;
    if (et === 7) {
        // EYE2 PNG — identical draw call to in-game
        if (eye2Idle.complete && eye2Idle.naturalWidth > 0) {
            const eyeW = eyeSpc * _ep2.wm * fs;
            c.drawImage(eye2Idle, -eyeW / 2, eyeY - eyeW * _ep2.vc, eyeW, eyeW);
        }
    } else if (et === 6) {
        [-1, 1].forEach(side => {
            c.save(); c.translate(side * eyeSpc, eyeY);
            c.beginPath(); c.ellipse(0, 0, eyeR, eyeR * 1.227, 0, 0, Math.PI * 2);
            c.fillStyle = '#fff'; c.fill(); c.clip();
            c.fillStyle = '#1a1a1a';
            c.beginPath(); c.ellipse(0, eyeR * 0.219, eyeR * 0.927, eyeR * 1.028, 0, 0, Math.PI * 2); c.fill();
            c.fillStyle = '#fff';
            c.beginPath(); c.arc(eyeR * 0.353, -eyeR * 0.491, eyeR * 0.174, 0, Math.PI * 2); c.fill();
            c.beginPath(); c.arc(eyeR * 0.564,  eyeR * 0.004, eyeR * 0.290, 0, Math.PI * 2); c.fill();
            c.restore();
        });
    } else if (et === 0) {
        [-1, 1].forEach(side => {
            c.save(); c.translate(side * eyeSpc, eyeY);
            c.beginPath(); c.arc(0, 0, eyeR, 0, Math.PI * 2);
            c.fillStyle = '#fff'; c.fill(); c.clip();
            c.fillStyle = '#1a1a1a'; c.beginPath(); c.arc(0, 0, eyeR * 0.9, 0, Math.PI * 2); c.fill();
            c.fillStyle = '#fff';
            c.beginPath(); c.arc(-eyeR * 0.4, -eyeR * 0.4, eyeR * 0.35, 0, Math.PI * 2); c.fill();
            c.beginPath(); c.arc(-eyeR * 0.1, -eyeR * 0.6, eyeR * 0.15, 0, Math.PI * 2); c.fill();
            c.restore();
        });
    } else {
        const eyeImg = custEyeImages[et];
        if (eyeImg && eyeImg.complete && eyeImg.naturalWidth > 0) {
            const eyeW = eyeSpc * _ep2.wm * fs;
            const eyeH = eyeW * custEyeAspect[et];
            c.drawImage(eyeImg, -eyeW / 2, eyeY - eyeH * _ep2.vc, eyeW, eyeH);
        }
    }

    // ── Mouth (idle state) ──
    const lt  = window.PLAYER_LIP_TYPE;
    const _LP2 = {
        1: { idle: { cy: 25.5, size: 53  } },
        2: { idle: { cy: 25.0, size: 102 } },
        3: { idle: { cy: 13.5, size: 132 }, idle2: { cy: 13.5, size: 132 } },
    };
    const _lp2 = _LP2[lt] || _LP2[1];
    const idleImg = lt === 2 ? lip2Idle : lt === 3 ? lip3Idle1 : lip1Idle;
    if (idleImg && idleImg.complete && idleImg.naturalWidth > 0) {
        const lipState = _lp2.idle;
        const idleS = lipState.size * fs;
        const cy    = lipState.cy * fs;
        c.drawImage(idleImg, -idleS / 2, cy - idleS * 0.5, idleS, idleS);
    } else if (idleImg && !idleImg.complete) {
        idleImg.onload = () => renderPreviewFace(canvas);
    }

    c.restore();
}

function updateCharacterVisuals() {
    // Sync type globals from carousel selections so preview reflects current choice
    window.PLAYER_EYE_TYPE = EYE_TYPE_MAP[currentEyeIndex];
    window.PLAYER_LIP_TYPE = LIP_TYPE_MAP[currentLipIndex];
    window.PLAYER_COLOR    = currentColor;
    document.getElementById('main-body').style.backgroundColor = currentColor;
    document.getElementById('refl-body').style.backgroundColor = currentColor;
    // Render face on canvas — identical coordinates to the in-game character
    renderPreviewFace(document.getElementById('preview-face-canvas'));
    renderPreviewFace(document.getElementById('avatar-face-canvas'));
}

function updateCarousel(containerId, currentIndex, itemsCount) {
    const items = document.querySelectorAll(`#${containerId} .carousel-item`);
    items.forEach(item => { item.className = 'carousel-item hidden'; });
    if (items[currentIndex]) items[currentIndex].className = 'carousel-item active';
    if (itemsCount > 1) {
        let prevIndex = (currentIndex - 1 + itemsCount) % itemsCount;
        if (items[prevIndex]) items[prevIndex].className = 'carousel-item prev';
    }
    if (itemsCount > 2) {
        let nextIndex = (currentIndex + 1) % itemsCount;
        if (items[nextIndex]) items[nextIndex].className = 'carousel-item next';
    }
}

function createCarousel(containerId, optionsArray, onSelectCallback) {
    const carousel = document.getElementById(containerId);
    optionsArray.forEach((bgUrl, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'carousel-item hidden';
        const icon = document.createElement('div');
        icon.className = 'carousel-icon';
        icon.style.backgroundImage = bgUrl;
        const reflection = document.createElement('div');
        reflection.className = 'carousel-reflection';
        reflection.style.backgroundImage = bgUrl;
        wrapper.appendChild(icon);
        wrapper.appendChild(reflection);
        wrapper.onclick = () => {
            onSelectCallback(i);
            updateCharacterVisuals();
        };
        carousel.appendChild(wrapper);
    });
}

function initCustomizer() {
    const colorGrid = document.getElementById('color-grid');
    CUST_COLORS.forEach((hex) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'swatch-wrapper' + (hex === currentColor ? ' active' : '');
        const sw = document.createElement('div');
        sw.className = 'swatch';
        sw.style.backgroundColor = hex;
        const reflection = document.createElement('div');
        reflection.className = 'swatch-reflection';
        reflection.style.backgroundColor = hex;
        wrapper.onclick = () => {
            document.querySelectorAll('.swatch-wrapper').forEach(s => s.classList.remove('active'));
            wrapper.classList.add('active');
            currentColor = hex;
            localStorage.setItem('avatarColor', currentColor);
            updateCharacterVisuals();
        };
        wrapper.appendChild(sw);
        wrapper.appendChild(reflection);
        colorGrid.appendChild(wrapper);
    });

    createCarousel('eye-carousel', EYE_OPTIONS, (index) => {
        currentEyeIndex = index;
        localStorage.setItem('avatarEyeIndex', currentEyeIndex);
        updateCarousel('eye-carousel', currentEyeIndex, EYE_OPTIONS.length);
    });

    createCarousel('lip-carousel', LIP_OPTIONS, (index) => {
        currentLipIndex = index;
        localStorage.setItem('avatarLipIndex', currentLipIndex);
        updateCarousel('lip-carousel', currentLipIndex, LIP_OPTIONS.length);
    });

    updateCharacterVisuals();
    updateCarousel('eye-carousel', currentEyeIndex, EYE_OPTIONS.length);
    updateCarousel('lip-carousel', currentLipIndex, LIP_OPTIONS.length);
}

function startGame() {
    if (hearts <= 0) {
        alert('No hearts left! Wait for them to regenerate.');
        return;
    }
    window.PLAYER_COLOR = currentColor;
    window.PLAYER_EYE_TYPE = EYE_TYPE_MAP[currentEyeIndex];
    window.PLAYER_LIP_TYPE = LIP_TYPE_MAP[currentLipIndex];
    document.getElementById('customizer-overlay').style.display = 'none';
    document.getElementById('main-menu').classList.remove('visible');

    // ── Apply stage-specific configuration ──────────────────────────────
    const _sIdx = (playingStage >= 1 && playingStage <= STAGE_CONFIG.length)
        ? playingStage - 1 : STAGE_CONFIG.length - 1;
    const _cfg = STAGE_CONFIG[_sIdx];
    stageItemTypes  = _cfg.itemTypes.slice();
    stageEnemyTypes = _cfg.enemyTypes.slice();
    stagePearlSpawn = _cfg.pearlSpawn;
    stageItemScale  = _cfg.itemScale || 1;

    // Re-seed items — cap at 25 on mobile to keep 60fps
    const _itemCount = IS_TOUCH ? Math.min(_cfg.itemCount || 25, 25) : (_cfg.itemCount || 25);
    items.length = 0;
    swallowFX.length = 0;
    for (let i = 0; i < _itemCount; i++) items.push(spawn(i > 5));
    // Guarantee at least one of each unlocked type near the player
    stageItemTypes.forEach(t => items.push(spawn(false, undefined, undefined, t)));

    // Re-seed enemies (or leave empty for early stages)
    enemies.length = 0;
    if (stageEnemyTypes.length > 0) {
        for (let i = 0; i < 6; i++) { const e = spawnEnemy(); if (e) enemies.push(e); }
    }

    // Re-seed spotlights
    spotlights.length = 0;
    if (_cfg.spotlights) initSpotlights();

    // Show game HUD & canvas
    document.getElementById('gameCanvas').style.display = '';
    document.getElementById('score-container').style.display = '';
    document.getElementById('eaten-container').style.display = '';
    document.getElementById('health-bar').style.display = '';
    document.getElementById('danger-bar').style.display = _cfg.spotlights ? '' : 'none';

    // Reset score display
    document.getElementById('scoreVal').textContent = '0';
    document.getElementById('eatenVal').textContent = '0';
    document.getElementById('danger-fill').style.width = '0%';
    updateHealthUI();

    update();
}

initCustomizer();

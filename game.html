<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mochi Pro: 3D Dark Tumblers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            overflow: hidden; background: #020202; touch-action: none;
            -webkit-user-select: none; user-select: none;
            font-family: 'Anton', sans-serif; cursor: none;
        }
        * { cursor: none !important; }
        canvas { display: block; position: fixed; inset: 0; }
        #gameCanvas { filter: contrast(1.04) saturate(1.15); cursor: none; }
        #finger-cursor {
            position: fixed; pointer-events: none; z-index: 9999;
            width: 44px; height: 44px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.75);
            background: rgba(255,255,255,0.18);
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
            transition: width 0.1s, height 0.1s, background 0.1s;
        }
        #finger-cursor.pressed {
            width: 34px; height: 34px;
            background: rgba(255,255,255,0.35);
        }

        #score-container {
            position: fixed;
            top: max(env(safe-area-inset-top, 0px), 24px);
            right: max(env(safe-area-inset-right, 0px), 24px);
            text-align: right; color: #ffffff;
            pointer-events: none;
            font-size: clamp(32px, 8vw, 48px);
            z-index: 10; letter-spacing: 2px;
        }

        #eaten-container {
            position: fixed;
            bottom: max(env(safe-area-inset-bottom, 0px), 24px);
            right: max(env(safe-area-inset-right, 0px), 24px);
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none;
            font-size: clamp(20px, 5vw, 30px);
            z-index: 10; letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* ── DANGER METER ── */
        #danger-bar {
            position: fixed;
            bottom: max(env(safe-area-inset-bottom, 0px), 22px);
            right:  max(env(safe-area-inset-right,  0px), 16px);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            z-index: 20; pointer-events: none;
        }
        #danger-label {
            font-size: clamp(7px, 1.8vw, 10px); font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            color: rgba(200,50,50,0.8);
        }
        #danger-track {
            width: clamp(8px, 2vw, 12px); height: clamp(80px, 20vw, 120px);
            background: rgba(255,255,255,0.07); border-radius: 99px;
            border: 1.5px solid rgba(255,100,100,0.2);
            overflow: hidden; display: flex; align-items: flex-end;
        }
        #danger-fill {
            width: 100%; height: 0%;
            background: linear-gradient(0deg, #ff4444, #ff8866);
            border-radius: 99px; transition: height 0.3s, box-shadow 0.3s;
        }

        /* ── WIN OVERLAY ── */
        #win-overlay {
            position: fixed; inset: 0; background: #000;
            display: none; flex-direction: column; justify-content: flex-start; align-items: center;
            color: white; z-index: 100;
            opacity: 0; transition: opacity 0.8s ease-in-out;
            padding: 0; text-align: center;
        }
        #win-anim-canvas {
            position: absolute; inset: 0; width: 100%; height: 100%; display: block;
        }
        #win-ui-top {
            position: relative; z-index: 2;
            padding: 28px 24px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        #win-gem-name {
            font-size: clamp(18px, 5vw, 30px); letter-spacing: 4px;
            font-family: 'Anton', sans-serif; text-transform: uppercase;
        }
        #win-stats {
            font-size: clamp(9px, 2.2vw, 12px); letter-spacing: 3px; opacity: 0.45;
            font-family: 'Montserrat', sans-serif; font-weight: 400;
        }
        #win-stats span { font-weight: 700; }
        #win-stats p { margin: 3px 0; }
        #win-overlay button {
            padding: 12px 32px; background: transparent; color: white;
            border: 1.5px solid rgba(255,255,255,0.45); font-weight: 600; cursor: pointer;
            border-radius: 50px; text-transform: uppercase; pointer-events: all;
            font-size: clamp(10px, 2.2vw, 13px); letter-spacing: 4px;
            font-family: 'Montserrat', sans-serif; transition: background 0.2s, border-color 0.2s;
        }
        #win-overlay button:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.75); }

        /* ── GAME OVER OVERLAY ── */
        #game-over-overlay {
            position: fixed; inset: 0;
            background: rgba(255, 68, 68, 1);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 100; font-weight: 900;
            opacity: 0; transition: opacity 1.5s ease-in-out;
            padding: 24px; text-align: center;
        }
        #game-over-overlay h1 { font-size: clamp(36px, 10vw, 80px); margin: 0; text-shadow: 4px 4px #a81b1b; }
        #game-over-overlay p  { font-size: clamp(11px, 3vw, 20px); letter-spacing: 5px; margin-top: 12px; }
        #game-over-overlay button {
            margin-top: 30px; padding: 15px 30px; background: white; color: #ff4444;
            border: none; font-weight: bold; cursor: pointer; border-radius: 50px;
            text-transform: uppercase; pointer-events: all; font-size: clamp(13px, 3vw, 16px);
        }

        /* ── HEALTH BAR ── */
        #health-bar {
            position: fixed;
            top: max(env(safe-area-inset-top, 0px), 24px);
            left: max(env(safe-area-inset-left, 0px), 24px);
            display: flex; gap: 8px; z-index: 25; pointer-events: none;
        }
        #hunted-bar {
            position: fixed;
            top: calc(max(env(safe-area-inset-top, 0px), 20px) + 55px);
            left: 50%; transform: translateX(-50%);
            width: clamp(150px, 40vw, 300px); height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px; overflow: hidden;
            display: none; z-index: 15;
            border: 1px solid rgba(255,255,255,0.3);
        }
        #hunted-fill {
            width: 100%; height: 100%;
            background: #fff; box-shadow: 0 0 10px #fff;
            transition: width 0.1s linear;
        }
        .health-dot {
            width: 14px; height: 14px; background: white; border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,255,255,0.4); transition: opacity 0.3s, transform 0.3s;
        }
        .health-lost { opacity: 0.2; transform: scale(0.5); }

        /* ── CUSTOMIZER OVERLAY ── */
        #customizer-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(180deg, #050505 0%, #1a1a1a 50%, #2a2a2a 100%);
            display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 200; overflow: hidden;
            padding: max(env(safe-area-inset-top, 0px), 40px) 20px max(env(safe-area-inset-bottom, 0px), 40px);
            color: white; font-family: 'Montserrat', sans-serif;
        }
        .top-section { margin-top: 10px; z-index: 10; }
        .play-btn {
            background: transparent; color: white;
            border: 1px solid white; border-radius: 30px;
            padding: 12px 45px; font-family: 'Montserrat', sans-serif;
            font-size: 15px; font-weight: 400; letter-spacing: 2px;
            cursor: pointer; transition: background 0.2s, color 0.2s, transform 0.1s;
        }
        .play-btn:active { background: white; color: #1a1a1a; transform: scale(0.95); }
        .preview-section {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; width: 100%;
        }
        .mochi-container {
            position: relative; width: clamp(160px, 45vw, 240px); aspect-ratio: 1 / 1;
        }
        .mochi-body {
            width: 100%; height: 100%; border-radius: 50%;
            background-color: #ff83df; position: relative; z-index: 2;
            transition: background-color 0.4s ease;
            box-shadow: inset -10px -20px 40px rgba(0,0,0,0.15), inset 10px 10px 30px rgba(255,255,255,0.3);
        }
        .mochi-eyes {
            position: absolute; width: 88%; height: 46%; left: 6%; top: 6%;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: background-image 0.3s ease;
        }
        .mochi-mouth {
            position: absolute; width: 96%; height: 58%; left: 2%; top: 40%;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: background-image 0.3s ease;
        }
        .mochi-reflection {
            width: 100%; height: 100%; border-radius: 50%;
            background-color: #ff83df; position: absolute; top: 0; left: 0;
            transform-origin: bottom center; transform: translateY(10px) scaleY(-0.35);
            filter: brightness(0.25) saturate(0.7) blur(1.5px);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 80%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 80%);
            z-index: 1; transition: background-color 0.4s ease; pointer-events: none;
        }
        .mochi-reflection .mochi-eyes, .mochi-reflection .mochi-mouth { opacity: 0.6; }
        .options-section {
            width: 100%; max-width: 400px; height: 180px; position: relative; margin-bottom: 20px;
        }
        .tab-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; opacity: 0; animation: fadeIn 0.3s ease forwards;
        }
        .tab-content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .color-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 15px 10px; justify-items: center; align-content: center; height: 100%;
        }
        .swatch-wrapper {
            position: relative; width: 48px; height: 48px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .swatch-wrapper.active { transform: scale(1.15); }
        .swatch {
            width: 100%; height: 100%; border-radius: 50%;
            cursor: pointer; position: absolute; top: 0; left: 0; z-index: 2;
        }
        .swatch-wrapper.active .swatch::after {
            content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid white;
        }
        .swatch-reflection {
            width: 100%; height: 100%; border-radius: 50%; position: absolute; top: 0; left: 0;
            transform-origin: bottom center; transform: translateY(6px) scaleY(-0.35);
            filter: blur(1.5px); opacity: 0.7;
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 80%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 80%);
            z-index: 1; pointer-events: none;
        }
        .carousel-container {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .carousel-item {
            position: absolute; width: 110px; height: 60px; display: flex; justify-content: center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s, filter 0.4s;
            cursor: pointer;
        }
        .carousel-icon {
            width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            position: absolute; top: 0; left: 0; z-index: 2;
        }
        .carousel-reflection {
            width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            position: absolute; top: 0; left: 0; transform-origin: bottom center;
            transform: translateY(8px) scaleY(-0.35); filter: blur(1px); opacity: 0.5;
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 80%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 80%);
            z-index: 1; pointer-events: none;
        }
        .carousel-item.active { transform: translateX(0) scale(1.3); z-index: 3; opacity: 1; filter: brightness(1); }
        .carousel-item.prev { transform: translateX(-100px) scale(0.85); z-index: 1; opacity: 0.4; filter: brightness(0.5); pointer-events: auto; }
        .carousel-item.next { transform: translateX(100px) scale(0.85); z-index: 1; opacity: 0.4; filter: brightness(0.5); pointer-events: auto; }
        .carousel-item.hidden { transform: translateX(0) scale(0.5); z-index: 0; opacity: 0; filter: brightness(0); pointer-events: none; }
        /* Lip PNGs are square — give them a taller box so they're not squashed */
        #lip-carousel .carousel-item { width: 90px; height: 90px; }
        .bottom-nav { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        .custom-nav-pill {
            display: flex; align-items: center; justify-content: space-between;
            width: 260px; height: 68px; border: 1px solid white; border-radius: 40px; padding: 0 5px;
        }
        .nav-item {
            width: 48px; height: 48px; border-radius: 50%; border: 1px solid white; background: #999;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.3s; position: relative;
        }
        .nav-item.active { background: transparent; }
        .nav-item:nth-child(2) { gap: 6px; align-items: flex-start; padding-top: 12px; }
        .nav-eye { width: 10px; height: 10px; background: white; border-radius: 50%; }
        .nav-item:nth-child(3) { position: relative; }
        .nav-lip { width: 8px; height: 8px; background: white; border-radius: 50%; position: absolute; bottom: 10px; }
        .close-btn {
            width: 54px; height: 54px; border-radius: 50%;
            background: transparent; border: 1px solid rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s, background 0.2s;
        }
        .close-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .close-btn svg { width: 22px; height: 22px; stroke: white; }

        /* ── OPENING SCREEN ── */
        #opening-screen {
            position: fixed; inset: 0;
            background: #000;
            z-index: 300;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        #opening-screen svg { width: 85%; max-width: 800px; height: auto; margin-bottom: 50px; }
        .tap-text {
            color: white; font-family: 'Montserrat', sans-serif; font-size: clamp(16px, 4vw, 24px); letter-spacing: 5px;
            animation: pulseText 2s infinite; cursor: pointer; text-transform: uppercase;
        }
        @keyframes pulseText { 0%, 100% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }

        /* ── MAIN MENU SCREEN ── */
        #main-menu {
            position: fixed; inset: 0;
            background: #000;
            z-index: 250;
            display: none; flex-direction: column;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
        }
        #main-menu.visible { display: flex; }

        .menu-top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: max(env(safe-area-inset-top, 0px), 16px) 16px 0;
            z-index: 2;
        }
        .menu-top-left { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
        .menu-top-center { display: flex; align-items: center; }
        .menu-top-right { display: flex; align-items: center; }

        /* Hearts pill */
        .hearts-container {
            display: flex; align-items: center;
            border-radius: 40px;
            padding: 10px 20px 10px 14px; gap: 6px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .hearts-container .heart-icon { width: 32px; height: 32px; }
        .hearts-container .heart-icon svg { width: 100%; height: 100%; }
        .hearts-count { font-size: 22px; font-weight: 700; margin-left: 6px; }
        .heart-timer {
            font-size: 13px; color: rgba(255,255,255,0.8);
            font-family: 'Montserrat', sans-serif; font-weight: 400;
            margin-top: 4px; letter-spacing: 1.5px;
            padding-left: 2px;
        }

        /* Avatar */
        .menu-avatar {
            width: 72px; height: 72px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.4);
            cursor: pointer; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .menu-avatar .avatar-mochi {
            width: 52px; height: 52px; border-radius: 50%;
            background: #ff83df; position: relative;
        }

        /* Pearl pill */
        .pearl-container {
            display: flex; align-items: center;
            border-radius: 40px;
            padding: 10px 14px 10px 20px; gap: 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .pearl-icon { width: 28px; height: 28px; }
        .pearl-icon svg { width: 100%; height: 100%; }
        .pearl-count { font-size: 22px; font-weight: 700; }

        /* Right side buttons */
        .menu-right-buttons {
            position: absolute;
            right: 16px;
            top: calc(max(env(safe-area-inset-top, 0px), 16px) + 80px);
            display: flex; flex-direction: column; gap: 16px;
            z-index: 2;
        }
        .side-btn {
            width: 56px; height: 56px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
            background: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; color: white;
        }
        .side-btn svg { width: 28px; height: 28px; }
        .notif-dot {
            position: absolute; top: 2px; right: 2px;
            width: 10px; height: 10px; border-radius: 50%;
            background: #ff4444; border: 2px solid #000;
        }

        /* Necklace map */
        .necklace-map-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative; padding: 20px;
            overflow: hidden;
        }
        .necklace-map-container svg { width: 100%; max-width: 420px; height: auto; }

        .gem-node {
            cursor: pointer; transition: filter 0.2s, opacity 0.2s;
        }
        .gem-node.current { animation: gemPulse 1.5s infinite; }
        @keyframes gemPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.4); }
        }

        /* Bottom nav */
        .menu-bottom-nav {
            display: flex; justify-content: space-around; align-items: center;
            padding: 16px 0 max(env(safe-area-inset-bottom, 0px), 16px);
            z-index: 2;
        }
        .nav-tab {
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 12px;
            opacity: 0.5; transition: opacity 0.2s;
            background: none; border: none; color: white;
        }
        .nav-tab.active { opacity: 1; }
        .nav-tab svg { width: 28px; height: 28px; }

        /* Settings overlay */
        #settings-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 260;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Montserrat', sans-serif; color: white;
            padding: 40px 20px;
        }
        #settings-overlay.visible { display: flex; }
        .settings-title { font-size: 24px; font-weight: 700; margin-bottom: 40px; letter-spacing: 2px; }
        .settings-group { width: 100%; max-width: 340px; margin-bottom: 24px; }
        .settings-label { font-size: 13px; font-weight: 600; margin-bottom: 10px; opacity: 0.7; letter-spacing: 1px; }
        .settings-slider {
            width: 100%; -webkit-appearance: none; appearance: none;
            height: 6px; border-radius: 3px; background: rgba(255,255,255,0.2);
            outline: none;
        }
        .settings-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px;
            border-radius: 50%; background: white; cursor: pointer;
        }
        .settings-toggle {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 340px; margin-bottom: 16px;
        }
        .toggle-switch {
            width: 48px; height: 26px; border-radius: 13px;
            background: rgba(255,255,255,0.2); position: relative;
            cursor: pointer; transition: background 0.3s;
        }
        .toggle-switch.on { background: #45e8c3; }
        .toggle-switch::after {
            content: ''; position: absolute;
            width: 20px; height: 20px; border-radius: 50%;
            background: white; top: 3px; left: 3px;
            transition: transform 0.3s;
        }
        .toggle-switch.on::after { transform: translateX(22px); }
        .settings-back {
            margin-top: 30px; padding: 12px 40px;
            background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 30px; color: white; font-weight: 600;
            cursor: pointer; font-size: 14px; letter-spacing: 1px;
            font-family: 'Montserrat', sans-serif;
        }

        /* Shop overlay */
        #shop-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 260;
            display: none; flex-direction: column;
            align-items: center;
            font-family: 'Montserrat', sans-serif; color: white;
            padding: max(env(safe-area-inset-top, 0px), 40px) 20px max(env(safe-area-inset-bottom, 0px), 20px);
        }
        #shop-overlay.visible { display: flex; }
        .shop-title { font-size: 24px; font-weight: 700; margin-bottom: 30px; letter-spacing: 2px; }
        .shop-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 16px; width: 100%; max-width: 360px; flex: 1; overflow-y: auto;
        }
        .shop-item {
            background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 20px; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .shop-item-icon { font-size: 36px; }
        .shop-item-name { font-size: 12px; font-weight: 600; }
        .shop-item-price {
            display: flex; align-items: center; gap: 4px;
            font-size: 14px; font-weight: 700; color: #c8b6ff;
        }
        .shop-item-price svg { width: 14px; height: 14px; }
        .shop-back {
            margin-top: 20px; padding: 12px 40px;
            background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 30px; color: white; font-weight: 600;
            cursor: pointer; font-size: 14px; letter-spacing: 1px;

function getConvexHull(points) {
    const unique = [];
    const map = new Set();
    for (const p of points) {
        const key = p.x.toFixed(2) + ',' + p.y.toFixed(2);
        if (!map.has(key)) {
            map.add(key);
            unique.push(p);
        }
    }
    unique.sort((a,b) => a.x === b.x ? a.y - b.y : a.x - b.x);
    const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
    let lower = [];
    for (let p of unique) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
        lower.push(p);
    }
    let upper = [];
    for (let i = unique.length - 1; i >= 0; i--) {
        let p = unique[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
        upper.push(p);
    }
    upper.pop(); lower.pop();
    return lower.concat(upper);
}

// ── DYNAMIC CUSTOM SHAPE REGISTRY ──
const SHAPE_DATA = {};

function registerShape(name, svgString) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgString, "image/svg+xml");
    const polys = doc.querySelectorAll('polygon');
    const viewBox = doc.documentElement.getAttribute('viewBox').split(' ').map(Number);
    const cx = viewBox[2]/2, cy = viewBox[3]/2;
    let allPts = [];
    let parsedPolys = [];
    
    polys.forEach(p => {
        const pts = p.getAttribute('points').trim().split(/\s+|,/).map(Number);
        const color = p.getAttribute('style').match(/fill:(#[a-fA-F0-9]+)/)[1];
        const vertices = [];
        for(let i=0; i<pts.length; i+=2) {
            let v = {x: pts[i]-cx, y: pts[i+1]-cy};
            vertices.push(v);
            allPts.push(v);
        }
        parsedPolys.push({color, vertices});
    });
    
    SHAPE_DATA[name] = {
        polys: parsedPolys,
        hull: getConvexHull(allPts),
        maxDim: Math.max(viewBox[2], viewBox[3])
    };
}

function darkenHex(hex, percent) {
    let col = parseInt(hex.slice(1), 16);
    let r = Math.floor((col >> 16) * (1 - percent));
    let g = Math.floor(((col >> 8) & 0x00FF) * (1 - percent));
    let b = Math.floor((col & 0x0000FF) * (1 - percent));
    return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).padStart(6, '0');
}

        curX: Math.cos(slot.angle) * 80,
        curY: Math.sin(slot.angle) * 80,
        slotName, isFaceItem: true

}

let _sdfPx = 0, _sdfPy = 0, _sdfWobble = 0, _sdfBaseR08 = 0, _sdfCheek = 0, _sdfTime2 = 0;
let _sdfBones = []; // flat cache: {bx,by,w09,w2,w015,w008,ao}
function _refreshSDF() {
    _sdfPx     = player.x;
    _sdfPy     = player.y;
    _sdfWobble = player.baseR + player.wobble + Math.sin(player.anim.time * 4) * 2;
    _sdfBaseR08= player.baseR * 0.8;
    _sdfCheek  = (coveragePercent > 50 ? 30 : 0) + player.anim.puff * 40;
    _sdfTime2  = player.anim.time * 2;

let stageItemTypes  = standardItems.slice();

let stagePearlSpawn = true;
let stageItemScale  = 1;

function getLeastUsedItemType() {
    const pool = stageItemTypes.length > 0 ? stageItemTypes : standardItems;
    const counts = {};
    pool.forEach(t => counts[t] = 0);
    items.forEach(it => {
        if (it && it.active && counts[it.type] !== undefined) {
            counts[it.type]++;
        }
    });

    let min = Infinity;
    let candidates = [];
    for (const type in counts) {
        if (counts[type] < min) {
            min = counts[type];
            candidates = [type];
        } else if (counts[type] === min) {
            candidates.push(type);
        }
    }
    return candidates[Math.floor(Math.random() * candidates.length)];
}

function getLeastUsedEnemyType() {
    const pool = stageEnemyTypes.length > 0 ? stageEnemyTypes : ['standard', 'pointDrainer1'];
    const counts = {};
    pool.forEach(t => counts[t] = 0);
    enemies.forEach(en => { if (en && en.type) counts[en.type]++; });
    
    let min = Infinity;
    let candidates = [];
    for (const type in counts) {
        if (counts[type] < min) {
            min = counts[type];
            candidates = [type];
        } else if (counts[type] === min) {
            candidates.push(type);
        }
    }
    return candidates[Math.floor(Math.random() * candidates.length)];
}

let _ac = null;

function _env(g, now, atk, decay, peak) {
    g.gain.setValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(peak, now + atk);
    g.gain.exponentialRampToValueAtTime(0.0001, now + atk + decay);
}
function _osc(ctx, type, freq, now, decay, peak, freqEnd) {

    o.frequency.setValueAtTime(freq, now);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, now + decay);
    _env(g, now, 0.005, decay, peak);
    o.start(now); o.stop(now + decay + 0.05);
}
function _noise(ctx, now, decay, peak, cutoff) {
    const sr = ctx.sampleRate;
    const buf = ctx.createBuffer(1, Math.ceil(sr * (decay + 0.05)), sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const flt = ctx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = cutoff || 2000;
    const g = ctx.createGain();
    src.connect(flt); flt.connect(g); g.connect(ctx.destination);
    _env(g, now, 0.003, decay, peak);
    src.start(now);
}

// Joystick: base = where finger first landed, knob = current finger pos clamped to radius
const JOYSTICK_RADIUS = 55;
const touchJoystick = { active: false, baseX: 0, baseY: 0, knobX: 0, knobY: 0 };

function _joystickUpdateMouse() {
    if (!touchJoystick.active) return;
    const dx = touchJoystick.knobX - touchJoystick.baseX;
    const dy = touchJoystick.knobY - touchJoystick.baseY;
    const dist = Math.hypot(dx, dy);
    if (dist < 6) {
        // Dead zone — stop the player
        rawMouse.x = canvas.width  / 2;
        rawMouse.y = canvas.height / 2;
    } else {
        // Analog speed: deflection ratio (0→1) maps to target distance (0→360px)
        const nx = dx / dist, ny = dy / dist;
        const speed = Math.min(dist / JOYSTICK_RADIUS, 1) * 360;
        rawMouse.x = canvas.width  / 2 + nx * speed;
        rawMouse.y = canvas.height / 2 + ny * speed;
    }
}

// SDF
// ─────────────────────────────────────────────
function smin(a, b, k) {
    const h = Math.max(k - Math.abs(a - b), 0) / k;
    return Math.min(a, b) - h * h * k * 0.25;
}
function sdPoly(px, py, vertices) {
    let d = 1e10, s = 1;
    for (let i = 0, j = vertices.length-1; i < vertices.length; j = i, i++) {
        const vi = vertices[i], vj = vertices[j];
        const eX = vj.x-vi.x, eY = vj.y-vi.y, wX = px-vi.x, wY = py-vi.y;
        const t  = Math.max(0, Math.min(1, (wX*eX+wY*eY)/(eX*eX+eY*eY)));
        const bX = wX-eX*t, bY = wY-eY*t;
        d = Math.min(d, bX*bX + bY*bY);
        const c1 = wY >= 0, c2 = wY-eY < 0, c3 = eX*wY-eY*wX > 0;
        if ((c1&&c2&&c3)||(!c1&&!c2&&!c3)) s *= -1;
    }
    return Math.sqrt(d) * s;
}
function getSceneSDF(px, py) {
    let d = Math.sqrt((px-_sdfPx)**2 + (py-_sdfPy)**2) - _sdfWobble;
    if (_sdfCheek > 0) {
        d = smin(d, Math.sqrt((px-(_sdfPx-60))**2 + (py-_sdfPy)**2) - (_sdfBaseR08+_sdfCheek), 40);
        d = smin(d, Math.sqrt((px-(_sdfPx+60))**2 + (py-_sdfPy)**2) - (_sdfBaseR08+_sdfCheek), 40);
    }
    const ia = Math.atan2(py-_sdfPy, px-_sdfPx);
    const blendK = (ia > -Math.PI*0.75 && ia < -Math.PI*0.25) ? 10 : 25;
    for (let i = 0; i < _sdfBones.length; i++) {
        const cb = _sdfBones[i];
        const dx = px - cb.bx, dy = py - cb.by;
        const fastDist = Math.sqrt(dx*dx + dy*dy);
        let d2 = fastDist - cb.w09;
        if (fastDist < cb.w2) {
            const bn = Math.sin(Math.atan2(dy,dx)*3 + _sdfTime2 + cb.ao) * cb.w015;
            d2 -= cb.w008 + Math.max(0, bn);
        }
        d = smin(d, d2, blendK);
    }
    return d;
}

// UPDATE
// ─────────────────────────────────────────────
let _lastFrameTime = 0;
function update() {
    const now = performance.now();
    // dt = 1.0 at 60fps (16.67ms/frame), 0.5 at 120fps, 2.0 at 30fps — calibrated to 60fps so
    // physics feel consistent across devices. Caps prevent huge jumps on tab-switch.
    const dt = _lastFrameTime ? Math.min((now - _lastFrameTime) / 16.67, IS_TOUCH ? 3 : 1.5) : 1;
    _lastFrameTime = now;
    if (!IS_TOUCH) {
        // Recompute rawMouse each frame as a joystick-style offset from the player's
        // current screen position so cursor distance = speed (near=slow, far=fast)
        const DESKTOP_THRESHOLD = 200; // screen-px from player for max speed
        const playerSx = (player.x - camera.x) * camera.zoom + canvas.width  / 2;
        const playerSy = (player.y - camera.y) * camera.zoom + canvas.height / 2;
        const cdx = desktopCursorScreen.x - playerSx;
        const cdy = desktopCursorScreen.y - playerSy;
        const cdist = Math.hypot(cdx, cdy);
        if (cdist < 1) {
            rawMouse.x = canvas.width  / 2;
            rawMouse.y = canvas.height / 2;
        } else {
            const speed = Math.min(cdist / DESKTOP_THRESHOLD, 1) * 400;
            rawMouse.x = canvas.width  / 2 + (cdx / cdist) * speed;
            rawMouse.y = canvas.height / 2 + (cdy / cdist) * speed;
        }
    }
    const worldM = {
        x: (rawMouse.x - canvas.width /2) / camera.zoom + camera.x,
        y: (rawMouse.y - canvas.height/2) / camera.zoom + camera.y
    };

    player.anim.time += 0.016 * dt;
    player.anim.puff *= Math.pow(0.9, dt);
    player.anim.gulp *= Math.pow(0.85, dt);
    player.anim.hit *= Math.pow(0.85, dt);
    player.anim.nextBlink -= dt;
    if (player.anim.nextBlink <= 0 && player.anim.blink === 0) {
        // First frame of new blink — decide wink or normal
        player.anim.winkSide = 0;
    }
    if (player.anim.nextBlink <= 0) {
        player.anim.blink = Math.min(1, player.anim.blink + 0.22 * dt);
        if (player.anim.blink >= 1 && player.anim.nextBlink < -18) player.anim.nextBlink = 160 + Math.random()*220;
    } else {
        player.anim.blink = Math.max(0, player.anim.blink - 0.18 * dt);
    }

    const oldX = player.x, oldY = player.y;
    if (winPhase === 0) {
        const spot = player._captureSpot;
        // Momentum lerp — on touch, actual movement velocity ramps toward the
        // intended step rather than applying it instantly. Creates natural inertia:
        // direction changes curve instead of snap, deceleration is smooth.
        // Desktop = 1.0 so mouse control stays exact.
        const mLerp = IS_TOUCH ? 1 - Math.pow(0.82, dt) : 1.0;
        if (spot && huntedTime <= 0) {
            // Glue effect — 0 at edge, 1 at center, squared for non-linear feel
            const _dDist = Math.hypot(player.x - spot.x, player.y - spot.y);
            const insideT = Math.max(0, 1 - _dDist / (spot.r * 0.85));
            // Remapped so even the rim (insideT~0) has ~50% of the full effect
            // stickyT goes from 0.5 at the edge to 1.0 at the center
            const stickyT = 0.5 + 0.5 * insideT;
            // Movement speed cut by up to 88%
            const speedMult = 1 - stickyT * 0.88;
            const moveLerp = (1 - Math.pow(1 - 0.025, dt)) * speedMult;
            const intendedX = (worldM.x - player.x) * moveLerp;
            const intendedY = (worldM.y - player.y) * moveLerp;
            player._mvx = (player._mvx || 0) + (intendedX - (player._mvx || 0)) * mLerp;
            player._mvy = (player._mvy || 0) + (intendedY - (player._mvy || 0)) * mLerp;
            player.x += player._mvx;
            player.y += player._mvy;
            // Pull toward center — present even at rim
            const pullStrength = stickyT * 0.03 * dt;
            player.x += (spot.x - player.x) * pullStrength;
            player.y += (spot.y - player.y) * pullStrength;
        } else {
            const moveLerp = 1 - Math.pow(1 - 0.025, dt);
            const intendedX = (worldM.x - player.x) * moveLerp;
            const intendedY = (worldM.y - player.y) * moveLerp;
            player._mvx = (player._mvx || 0) + (intendedX - (player._mvx || 0)) * mLerp;
            player._mvy = (player._mvy || 0) + (intendedY - (player._mvy || 0)) * mLerp;
            player.x += player._mvx;
            player.y += player._mvy;
        }
    }
    player.vx = player.x - oldX; player.vy = player.y - oldY;

    const vMult = 3.2;
    // Normalize speed to per-120fps-frame so wobble feels the same
    const spd = Math.hypot(player.vx, player.vy) * vMult / dt;
    player.wobbleV = (player.wobbleV + (spd*0.6 - player.wobble)*0.2 * dt) * Math.pow(0.85, dt);
    player.wobble += player.wobbleV * dt;

    if (spotlightDanger) {
        player.history.length = 0;
    } else {
        player.history.unshift({x: player.x, y: player.y});
        if (player.history.length > 68) player.history.pop();
    }

    maxLimbDist = player.baseR;
    Object.values(player.currentGrowth).forEach(g => { if (player.baseR+g > maxLimbDist) maxLimbDist = player.baseR+g; });

    player.bones.forEach(b => {
        const tx = Math.cos(b.relAngle)*b.relDist, ty = Math.sin(b.relAngle)*b.relDist;
        const boneLerp = 1 - Math.pow(1 - 0.45, dt);
        b.curX += (tx - b.curX)*boneLerp - player.vx*vMult*0.2;
        b.curY += (ty - b.curY)*boneLerp - player.vy*vMult*0.2;
        const ambRot    = Math.sin(player.anim.time*b.ambientSpeed + b.ambientOffset) * 0.1;
        const diff      = Math.atan2(Math.sin(b.baseRot+ambRot-b.rot), Math.cos(b.baseRot+ambRot-b.rot));
        const rotSpring = b.jiggleSpeed;
        const twist     = (player.vx*vMult - player.vy*vMult) * 0.0004 * b.torqueDir;
        b.vRot = (b.vRot + diff*rotSpring*dt + twist) * Math.pow(0.9, dt);
        b.rot += b.vRot * dt;
    });

    const camLerp = 1 - Math.pow(1 - 0.05, dt);
    camera.x += (player.x - camera.x) * camLerp;
    camera.y += (player.y - camera.y) * camLerp;

    const viewW = canvas.width / camera.zoom;
    const viewH = canvas.height / camera.zoom;
    const despawnDist = Math.hypot(viewW, viewH) / 2 + 3000;

    const targetWorldRadius = (canvas.height * 0.2) / camera.zoom;
    if (winPhase === 0) {
        coveragePercent = Math.min(100, Math.floor((maxLimbDist / targetWorldRadius) * 100));
        scoreEl.innerText = coveragePercent;
        if (coveragePercent >= 100) {
            winPhase = 2;
            const gemName = (playingStage > 0 && playingStage <= NECKLACE_GEMS.length)
                ? NECKLACE_GEMS[playingStage - 1].name : '';
            const nextStageNum = (playingStage >= 1 ? playingStage : currentStage) + 1;
            const stageUnlockMsg = (nextStageNum > currentStage && nextStageNum <= TOTAL_STAGES)
                ? `<p>STAGE ${nextStageNum} UNLOCKED</p>` : '';
            document.getElementById('win-gem-name').textContent = gemName ? gemName + ' GEM' : '';
            document.getElementById('win-stats').innerHTML =
                stageUnlockMsg +
                `<p>PEARLS EARNED: <span>${enemiesEaten}</span></p>`;
            winOverlay.style.display = 'flex';
            setTimeout(() => { winOverlay.style.opacity = '1'; }, 50);
            startWinAnim(playingStage > 0 ? playingStage : currentStage);
        }
    }

    if (shakeTime > 0) shakeTime -= dt;
    if (flashAlpha > 0) flashAlpha -= 0.05 * dt;
    if (hitCooldown > 0) hitCooldown -= dt;
    if (huntedTime > 0) huntedTime -= dt;

    // Update hit splash particles
    for (let i = hitSplashes.length - 1; i >= 0; i--) {
        const s = hitSplashes[i];
        if (s.type === 'ring') {
            s.r += (s.maxR - s.r) * (1 - Math.pow(1 - 0.15, dt));
            s.width *= Math.pow(0.9, dt);
        } else {
            s.x += s.vx * dt; s.y += s.vy * dt;
            s.vx *= Math.pow(0.88, dt); s.vy *= Math.pow(0.88, dt);
            if (s.vRot) {
                s.rot += s.vRot * dt;
                s.vRot *= Math.pow(0.98, dt);
            }
        }
        s.life -= s.decay * dt;
        if (s.life <= 0) hitSplashes.splice(i, 1);
    }

    if (huntedTime > 0) {
        huntedBar.style.display = 'block';
        huntedFill.style.width = (huntedTime / 600 * 100) + '%';
    } else {
        huntedBar.style.display = 'none';
    }

    // Enemies + danger meter
    if (winPhase === 0) {
        _refreshSDF(); // cache player state once for all enemy SDF collision checks below
        let closestEnemy = Infinity;
        enemies.forEach((en, idx) => {
            if (en.exploding) {
                en.explodeTimer -= dt;
                if (en.explodeTimer <= 0) {
                    const _ne = spawnEnemy();
                    if (_ne) enemies[idx] = _ne; else enemies.splice(idx, 1);
                }
                return;
            }
            const dx = player.x - en.x, dy = player.y - en.y;
            const dist = Math.hypot(dx, dy);
            if (dist < closestEnemy && en.type === 'standard') closestEnemy = dist;
            
            en.time += en.timeRate * dt;

            // Blink Logic
            en.nextBlink -= dt;
            if (en.nextBlink <= 0) {
                en.blink = Math.min(1, en.blink + 0.15 * dt);
                if (en.blink >= 1 && en.nextBlink < -10) en.nextBlink = 100 + Math.random()*200;
            } else {
                en.blink = Math.max(0, en.blink - 0.15 * dt);
            }

            // Handle the morphing
            if (huntedTime > 0) {
                en.spikeEmerge += (0 - en.spikeEmerge) * (1 - Math.pow(1 - 0.05, dt));

                const awayAngle = Math.atan2(-dy, -dx);
                en.targetAngle = awayAngle + Math.sin(en.time * 3) * 0.4;
                en.speed = 7.0 + coveragePercent * 0.05;
            } else {
                en.spikeEmerge += (1 - en.spikeEmerge) * (1 - Math.pow(1 - 0.05, dt));

                let organicTurn = Math.sin(en.time * 1.5) * Math.cos(en.time * 0.8) * 0.03 * dt;
                en.targetAngle += organicTurn;

                if (dist > 3500) {
                    const homeAngle = Math.atan2(dy, dx);
                    let homeDiff = homeAngle - en.targetAngle;
                    while (homeDiff < -Math.PI) homeDiff += Math.PI * 2;
                    while (homeDiff > Math.PI) homeDiff -= Math.PI * 2;
                    en.targetAngle += homeDiff * 0.01 * dt;
                }
                en.speed = 3.0 + coveragePercent * 0.05;
            }

            let diff = en.targetAngle - en.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            en.angle += diff * (1 - Math.pow(1 - 0.03, dt));

            const targetVx = Math.cos(en.angle) * en.speed;
            const targetVy = Math.sin(en.angle) * en.speed;

            en.vx += (targetVx - en.vx) * (1 - Math.pow(1 - 0.05, dt));
            en.vy += (targetVy - en.vy) * (1 - Math.pow(1 - 0.05, dt));

            en.x += en.vx * dt;
            en.y += en.vy * dt + Math.sin(en.time * 5 + en.floatOffset) * 2.0;

            // More accurate collision detection using the player's full SDF shape.
            const sdfDist = getSceneSDF(en.x, en.y);
            const isHit = sdfDist < en.r;
            
            if (isHit && hitCooldown <= 0) {
                if (huntedTime > 0) {
                    // Eat ALL enemy types while invincible
                    const _ne2 = spawnEnemy();
                    if (_ne2) enemies[idx] = _ne2; else enemies.splice(idx, 1);
                    player.baseR += 15; player.wobbleV += 50;
                    enemiesEaten++;
                    eatenEl.innerText = enemiesEaten;
                    sfxEatEnemy();
                    player.anim.gulp = 1;
                    for(let i=0; i<8; i++) {
                        const a = Math.random()*Math.PI*2;
                        player.particles.push({ x: en.x, y: en.y, life:1, v:10+Math.random()*10, w:4 });
                    }
                } else {
                    if (en.type === 'standard') {
                        // Spiky enemy: lose 1 HP only, items stay
                        health--;
                        player.anim.hit = 1;
                        spawnEnemyDebris(en.x, en.y, '#3e3e3e');
                        updateHealthUI();
                        shakeTime = 15; flashAlpha = 0.7; hitCooldown = 60;
                        haptic([30, 10, 60]); sfxHit();
                        spawnHitSplash(player.x, player.y);
                        const _ne3 = spawnEnemy();
                        if (_ne3) enemies[idx] = _ne3; else enemies.splice(idx, 1);

                        if (health <= 0) {
                            winPhase = 3;
                            deathTimer = 0;
                            gooBlobs = [];
                            DEATH_DUR = 440;
                            for (let i = 0; i < 20; i++) {
                                const ang = Math.random() * Math.PI * 2;
                                const spd = 6 + Math.random() * 20;
                                gooBlobs.push({
                                    x: player.x + (Math.random()-0.5)*100,
                                    y: player.y - 10 + (Math.random()-0.5)*60,
                                    vx: Math.cos(ang)*spd*1.6,
                                    vy: Math.sin(ang)*spd*1.3 - 14,
                                    r: 10 + Math.random()*28,
                                    landed: false, landY: 0,
                                    squeezed: 0, wobble: Math.random()*Math.PI*2,
                                    alpha: 0.85 + Math.random()*0.15,
                                });
                            }
                        }
                    } else {
                        // Bomb enemy: lose ALL items
                        loseAllItems();
                        player.anim.hit = 1;
                        shakeTime = 20; flashAlpha = 0.8; hitCooldown = 60;
                        haptic([50, 20, 80]); sfxBombHit();
                        spawnAnimeExplosion(en.x, en.y);
                        en.exploding = true;
                        en.explodeTimer = 45;
                    }
                }
            }
            if (dist > despawnDist) { const _ne4 = spawnEnemy(); if (_ne4) enemies[idx] = _ne4; else enemies.splice(idx, 1); }
        });
        const dangerPct = Math.max(0, Math.min(100, (1 - (closestEnemy - 800) / 1700) * 100));
        dangerFill.style.height    = dangerPct + '%';
        dangerFill.style.boxShadow = dangerPct > 60 ? `0 0 ${dangerPct/5}px #ff4444` : 'none';
    }

    // Reset global danger state each frame
    spotlightDanger = false;
    spotlights.forEach(s => {
        s.angle += s.speed * dt;
        s.x = s.cx + Math.cos(s.angle) * s.orbitR;
        s.y = s.cy + Math.sin(s.angle * 0.7) * s.orbitR;

        const margin = 4000;
        if (s.cx - camera.x > viewW/2 + margin) s.cx -= (viewW + margin*2);
        else if (s.cx - camera.x < -viewW/2 - margin) s.cx += (viewW + margin*2);
        if (s.cy - camera.y > viewH/2 + margin) s.cy -= (viewH + margin*2);
        else if (s.cy - camera.y < -viewH/2 - margin) s.cy += (viewH + margin*2);

        // ── DANGER ZONE: player inside spotlight ───────────────────────────
        const _dDist = Math.hypot(player.x - s.x, player.y - s.y);
        s.danger = (winPhase === 0) && huntedTime <= 0 && _dDist < s.r * 0.85;
        if (s.danger) {
            spotlightDanger = true;
            // Store the capturing spotlight so movement code can apply glue
            if (!player._captureSpot) player._captureSpot = s;
        } else if (player._captureSpot === s) {
            player._captureSpot = null;
        }

        if (s.danger) {
            s.itemLossTimer = (s.itemLossTimer || 0) + dt;
            if (s.itemLossTimer >= 30) {
                s.itemLossTimer = 0;
                for (let i = player.bones.length - 1; i >= 0; i--) {
                    if (!player.bones[i].isFaceItem) {
                        const _b = player.bones.splice(i, 1)[0];
                        player.currentGrowth[_b.slotName] = Math.max(0, player.currentGrowth[_b.slotName] - _b.scale * 16);
                        shakeTime = 8;
                        break;
                    }
                }
            }
        } else {
            s.itemLossTimer = 0;
        }
    });
    // Global flicker phase — drives all spotlights in sync when danger is active
    globalFlickerPhase += (spotlightDanger ? 0.45 : 0.04) * dt;

    let vacuuming = false;
    items.forEach((it, idx) => {
        if (!it.active) return;
        const dist   = Math.hypot(player.x - it.x, (player.y-15) - it.y);
        
        if (winPhase === 0 && dist > despawnDist) {
            items[idx] = spawn();
            return;
        }

        const vRange = winPhase === 1 ? 10000 : 1000 + maxLimbDist*1.5;
        if (dist < vRange) {
            vacuuming  = true;
            it.sucking = Math.min(1, it.sucking + 0.05 * dt);
            const angle = Math.atan2((player.y-15) - it.y, player.x - it.x);
            const pull  = winPhase === 1 ? 70 : 5 + (1 - Math.min(1, dist/vRange))*30;
            it.vx += Math.cos(angle)*pull * dt; it.vy += Math.sin(angle)*pull * dt;
            it.x  += it.vx * dt; it.y += it.vy * dt;
            const itemDamp = winPhase === 1 ? 0.8 : 0.6;
            it.vx *= Math.pow(itemDamp, dt);
            it.vy *= Math.pow(itemDamp, dt);
            it.rot += it.spin * (winPhase === 1 ? 4 : 2) * dt;
            const eatDist = winPhase === 1 ? 150 : player.baseR*0.8 + 20*it.scale;
            if (dist < eatDist) {
                it.active = false;
                // Spawn a swallow FX particle so the item visually slides into the mouth
                swallowFX.push({
                    x: it.x, y: it.y,
                    type: it.type, scale: it.scale, rot: it.rot,
                    img: it.img, w: it.w, color: it.color,
                    t: 0 // 0 → 1 over ~18 frames
                });
                player.anim.gulp = 1; player.anim.puff = 1;
                haptic(25);
                if (winPhase === 1) {
                    player.baseR += 100; player.wobbleV += 150;
                } else {
                    if (it.type === 'pearl') {
                        huntedTime = 600;
                        haptic([15, 8, 15, 8, 25]); sfxPearl();
                        flashAlpha = 1.2; // big cinematic white flash
                        setTimeout(() => { items[idx] = spawn(); }, 400);
                    } else {
                    sfxPickup();
                    player.wobbleV += 35;
                    const sorted = [...SLOTS].sort((a,b) => player.currentGrowth[a.name] - player.currentGrowth[b.name]);
                    const target = sorted[0];
                    const stack  = player.baseR + player.currentGrowth[target.name];
                    player.bones.push({
                        ...it,
                        originalScale: it.scale,
                        pal: PLAYER_PALETTE, 
                        relAngle: target.angle + (Math.random()*0.7 - 0.35),
                        relDist:  stack,
                        curX:     Math.cos(target.angle) * stack,
                        curY:     Math.sin(target.angle) * stack,
                        baseRot:  it.rot,
                        vx: 0, vy: 0, vRot: 0,
                        torqueDir:      (Math.random() - 0.5) * 1.5,
                        jiggleSpeed:   0.04 + Math.random() * 0.03,
                        ambientSpeed:  0.3  + Math.random() * 0.6,
                        ambientOffset: Math.random() * Math.PI * 2,
                        slotName: target.name,
                        isFaceItem: false
                    });
                    player.currentGrowth[target.name] += it.scale * 8;
                    setTimeout(() => { items[idx] = spawn(); }, 400);
                    }
                }
            }
        } else {
            it.sucking *= Math.pow(0.85, dt);
            it.rot += it.spin * dt;
        }
    });

    if (winPhase === 1) {
        // unused, win now triggers immediately at 100%
    } else {
        player.anim.mouth += ((vacuuming ? 1 : 0) - player.anim.mouth) * (1 - Math.pow(1 - 0.2, dt));
    }

    // Advance swallow FX timers
    for (let i = swallowFX.length - 1; i >= 0; i--) {
        swallowFX[i].t += 0.07 * dt; // ~14 frames to complete
        if (swallowFX[i].t >= 1) swallowFX.splice(i, 1);
    }

    if (vacuuming) player.anim.suckWave += 0.4 * dt;
    if (vacuuming && Math.random() > 0.3) {
        const a = Math.random() * Math.PI * 2;
        player.particles.push({ x: player.x+Math.cos(a)*800, y: (player.y-15)+Math.sin(a)*800, life:1, v:22, w:2+Math.random()*3 });
    }
    player.particles.forEach((p, i) => {
        const a = Math.atan2((player.y-15)-p.y, player.x-p.x);
        p.x += Math.cos(a)*p.v*dt; p.y += Math.sin(a)*p.v*dt; p.life -= 0.04 * dt;
        if (p.life <= 0 || Math.hypot(player.x-p.x,(player.y-15)-p.y) < 15) player.particles.splice(i, 1);
    });

    // Death animation update
    if (winPhase === 3) {
        deathTimer += dt;
        gooBlobs.forEach(b => {
            if (!b.landed) {
                b.vy += 0.85 * dt; b.x += b.vx * dt; b.y += b.vy * dt;
                b.vx *= Math.pow(0.95, dt); b.vy *= Math.pow(0.98, dt);
                if (b.vy > 0 && b.y > player.y + 40) { b.landed = true; b.landY = b.y; }
            } else {
                b.squeezed = Math.min(1, b.squeezed + 0.055 * dt);
            }
            b.wobble += 0.07 * dt;
        });
        if (deathTimer >= DEATH_DUR) {
            const overlay = document.getElementById('game-over-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; }, 50);
        }
    }

    draw();
    if (winPhase < 2 || (winPhase === 3 && deathTimer < DEATH_DUR)) requestAnimationFrame(update);
}

// 3D ITEM DRAWING
// ─────────────────────────────────────────────
// Rasterization cache for items
const _itemCache = {};
function _getItemCache(type, grayscale) {
    const key = type + (grayscale ? '_g' : '_c');
    if (_itemCache[key]) return _itemCache[key];

    if (type === 'pearl') {
        if (!imgPearl.complete) return null;
        const size = 160;
        const off = document.createElement('canvas');
        off.width = off.height = size;
        const oc = off.getContext('2d');
        if (grayscale) oc.filter = 'grayscale(100%) brightness(70%)';
        oc.drawImage(imgPearl, 0, 0, size, size);
        oc.filter = 'none';
        _itemCache[key] = { canvas: off, size, renderSize: 155 };
        return _itemCache[key];
    }

    const shape = SHAPE_DATA[type];
    if (!shape) return null;

    const getCol = (col) => {
        if (!grayscale) return col;
        const r = parseInt(col.slice(1,3), 16);
        const g = parseInt(col.slice(3,5), 16);
        const b = parseInt(col.slice(5,7), 16);
        const l = Math.round(0.299*r + 0.587*g + 0.114*b).toString(16).padStart(2,'0');
        return '#' + l + l + l;
    };

    const pad = 4;
    const baseSize = shape.maxDim + pad * 2;
    const off = document.createElement('canvas');
    off.width = off.height = Math.ceil(baseSize);
    const oc = off.getContext('2d');
    oc.translate(baseSize / 2, baseSize / 2);
    const sc = baseSize / (shape.maxDim / 2.2) * 0.5;
    oc.scale(sc, sc);
    shape.polys.forEach(poly => {
        oc.fillStyle = getCol(poly.color);
        oc.beginPath();
        poly.vertices.forEach((v, i) => { if(i===0) oc.moveTo(v.x, v.y); else oc.lineTo(v.x, v.y); });
        oc.closePath(); oc.fill();
    });
    _itemCache[key] = { canvas: off, size: baseSize, renderSize: baseSize / sc };
    return _itemCache[key];
}

function draw3DItem(c, obj, wx, wy, applyGradientLight = false, grayscale = false) {
    const s = obj.w * 0.85;
    const cached = _getItemCache(obj.type, grayscale);
    if (cached) {
        const drawScale = s / (cached.renderSize * 0.5);
        const half = cached.size * 0.5;
        c.save();
        c.scale(drawScale, drawScale);
        c.drawImage(cached.canvas, -half, -half);
        c.restore();
    }
}

// ─────────────────────────────────────────────
// DRAW ENEMY (EXACT SVG MORPHING GEOMETRY)
// ─────────────────────────────────────────────
// Draws realistic specular glare points on a lit sphere.
// 2–3 glare spots at surface positions facing the light source,
// each independently fading in/out. Arms drawn as tapered filled triangles.
function drawPearlGlare(c, x, y, r, t) {
    // 3 glare points — each orbits a base angle slowly, drifting across the pearl surface
    const points = [
        { baseAngle: -2.4,  orbitSpeed: 0.22, orbitAmt: 0.45, phase: 0.0, speed: 0.8, hue: 330 },
        { baseAngle:  0.3,  orbitSpeed: 0.15, orbitAmt: 0.35, phase: 2.2, speed: 0.6, hue: 48  },
        { baseAngle:  2.1,  orbitSpeed: 0.19, orbitAmt: 0.40, phase: 4.0, speed: 1.0, hue: 185 },
    ];

    c.save();
    c.globalCompositeOperation = 'screen';

    points.forEach(({ baseAngle, orbitSpeed, orbitAmt, phase, speed, hue }) => {
        // Slowly drift the angle over time — each point roams independently
        const angle = baseAngle + Math.sin(t * orbitSpeed + phase) * orbitAmt;
        // Radius from center also pulses slightly (0.6–0.82 of pearl radius)
        const dist = r * (0.7 + 0.12 * Math.sin(t * orbitSpeed * 1.7 + phase + 1.3));
        const sx = x + Math.cos(angle) * dist;
        const sy = y + Math.sin(angle) * dist;

        // Breathes slowly, never fully disappears (min 0.4)
        const raw   = Math.sin(t * speed + phase);
        const alpha = 0.4 + 0.6 * (0.5 + 0.5 * raw);

        // Arms extend beyond the pearl
        const longArm  = r * (1.8 + 0.9 * alpha);
        const shortArm = longArm * 0.48;
        const hw       = r * 0.05 * alpha;  // base width of each arm

        const drawArm = (angle, len, rootA, midHue) => {
            const ex = sx + Math.cos(angle) * len;
            const ey = sy + Math.sin(angle) * len;
            const px = -Math.sin(angle) * hw;
            const py =  Math.cos(angle) * hw;
            const g  = c.createLinearGradient(sx, sy, ex, ey);
            g.addColorStop(0,    `rgba(255,255,255,${rootA})`);
            g.addColorStop(0.12, `hsla(${hue},100%,92%,${rootA * 0.9})`);
            g.addColorStop(0.35, `hsla(${midHue},90%,85%,${rootA * 0.5})`);
            g.addColorStop(0.7,  `hsla(${(midHue+40)%360},80%,80%,${rootA * 0.15})`);
            g.addColorStop(1,    'rgba(255,255,255,0)');
            c.beginPath();
            c.moveTo(sx + px, sy + py);
            c.lineTo(sx - px, sy - py);
            c.lineTo(ex, ey);
            c.closePath();
            c.fillStyle = g;
            c.fill();
        };

        const hue2 = (hue + 60)  % 360;
        const hue3 = (hue + 120) % 360;

        // 4 long cardinal arms
        drawArm(0,           longArm,        alpha * 0.95, hue2);
        drawArm(Math.PI,     longArm,        alpha * 0.95, hue2);
        drawArm(-Math.PI/2,  longArm * 0.9,  alpha * 0.9,  hue3);
        drawArm( Math.PI/2,  longArm * 0.9,  alpha * 0.9,  hue3);
        // 4 shorter diagonal arms
        drawArm( Math.PI/4,   shortArm, alpha * 0.65, hue2);
        drawArm(-Math.PI/4,   shortArm, alpha * 0.65, hue2);
        drawArm( Math.PI*3/4, shortArm, alpha * 0.65, hue3);
        drawArm(-Math.PI*3/4, shortArm, alpha * 0.65, hue3);

        // Colored bloom at the glare origin
        const gR = r * 0.52 * alpha;
        const grd = c.createRadialGradient(sx, sy, 0, sx, sy, gR);
        grd.addColorStop(0,    `rgba(255,255,255,${alpha})`);
        grd.addColorStop(0.2,  `hsla(${hue},100%,92%,${alpha * 0.8})`);
        grd.addColorStop(0.55, `hsla(${hue2},80%,85%,${alpha * 0.3})`);
        grd.addColorStop(1,    'rgba(255,255,255,0)');
        c.fillStyle = grd;
        c.beginPath();
        c.arc(sx, sy, gR, 0, Math.PI * 2);
        c.fill();
    });

    c.restore();
}

function drawGlareStar(c, x, y, r, t, hue) {
    // Three specular points on the sphere surface at different angles,
    // simulating multiple light sources / reflections
    const points = [
        { ox: -0.30, oy: -0.35, phase: 0.0,  speed: 1.3 },  // main highlight (upper-left)
        { ox:  0.42, oy: -0.18, phase: 2.1,  speed: 0.9 },  // secondary (upper-right)
        { ox: -0.10, oy:  0.38, phase: 4.3,  speed: 1.6 },  // tertiary (lower)
    ];

    c.save();
    c.globalCompositeOperation = 'screen';

    points.forEach(({ ox, oy, phase, speed }) => {
        const sx = x + ox * r;
        const sy = y + oy * r;

        // Each glare fades in/out independently — clamp to 0 so they fully disappear
        const raw = Math.sin(t * speed + phase);
        const alpha = Math.max(0, raw) * (0.5 + 0.5 * Math.abs(raw));
        if (alpha < 0.04) return;

        const armLen = r * (0.55 + 0.45 * alpha);
        const hw = r * 0.028 * alpha; // half-width at base (tapered to 0 at tip)

        // Draw one tapered arm (filled triangle, not a stroke line)
        const drawArm = (angle, len, bright, col) => {
            const ex = sx + Math.cos(angle) * len;
            const ey = sy + Math.sin(angle) * len;
            const px = -Math.sin(angle) * hw;
            const py =  Math.cos(angle) * hw;
            const g = c.createLinearGradient(sx, sy, ex, ey);
            g.addColorStop(0,   `rgba(255,255,255,${bright})`);
            g.addColorStop(0.25, col);
            g.addColorStop(1,   'rgba(255,255,255,0)');
            c.beginPath();
            c.moveTo(sx + px, sy + py);
            c.lineTo(sx - px, sy - py);
            c.lineTo(ex, ey);
            c.closePath();
            c.fillStyle = g;
            c.fill();
        };

        const h1 = (hue + phase * 40) % 360;
        const h2 = (h1 + 90) % 360;
        const bright = alpha * 0.9;
        const col1 = `hsla(${h1},70%,90%,${alpha * 0.5})`;
        const col2 = `hsla(${h2},70%,88%,${alpha * 0.4})`;

        // 4 main arms + 4 shorter diagonal arms
        drawArm(0,             armLen,       bright, col1);
        drawArm(Math.PI,       armLen,       bright, col1);
        drawArm(-Math.PI/2,    armLen * 0.8, bright, col2);
        drawArm(Math.PI/2,     armLen * 0.8, bright, col2);
        drawArm(Math.PI/4,     armLen * 0.45, alpha * 0.5, col2);
        drawArm(-Math.PI/4,    armLen * 0.45, alpha * 0.5, col2);
        drawArm(Math.PI*3/4,   armLen * 0.45, alpha * 0.5, col2);
        drawArm(-Math.PI*3/4,  armLen * 0.45, alpha * 0.5, col2);

        // Tight bright glow at the specular point
        const gR = r * 0.22 * alpha;
        const g  = c.createRadialGradient(sx, sy, 0, sx, sy, gR);
        g.addColorStop(0,   `rgba(255,255,255,${alpha * 0.9})`);
        g.addColorStop(0.4, `hsla(${h1},60%,95%,${alpha * 0.45})`);
        g.addColorStop(1,   'rgba(255,255,255,0)');
        c.fillStyle = g;
        c.beginPath();
        c.arc(sx, sy, gR, 0, Math.PI * 2);
        c.fill();
    });

    c.restore();
}

function drawEnemy(c, en) {
    if (en.type === 'standard') {
        c.save();
        c.translate(en.x, en.y);
        c.rotate(en.angle - Math.PI / 2); 

        const svgWidth = 935.46;
        const scale = (en.r * 2.0) / svgWidth; 
        c.scale(scale, scale);
        
        const cx = 460.89;
        const cy = 476.08;
        c.translate(-cx, -cy);
        const coreR = 324.53;

        // --- LAYER 1: GREY SCALE 3D SPHERE ---
        c.save();
        c.translate(cx, cy);

        // The spiky enemy's body parts and shadow
        const _isPearl = huntedTime > 0;
        const _eTime = en.time;
        if (!IS_TOUCH) {
            c.shadowColor = _isPearl ? 'rgba(200,180,255,0.5)' : '#3e3e3e';
            c.shadowBlur = 20;
            c.shadowOffsetX = 0;
            c.shadowOffsetY = 0;
        }

        if (_isPearl) {
            // Pearly neutral base — white/silver like a real pearl
            let grad = c.createRadialGradient(-coreR*0.3, -coreR*0.3, coreR*0.1, 0, 0, coreR);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, '#f2eef5');
            grad.addColorStop(0.6, '#d5cee0');
            grad.addColorStop(1, '#a898b8');
            c.fillStyle = grad;
            c.beginPath();
            c.arc(0, 0, coreR, 0, Math.PI * 2);
            c.fill();

            // Iridescent color band sweeping across — narrow rainbow stripe
            // that slides over the surface (like oil film / TCGP card)
            const bandAngle = _eTime * 0.8;
            const bandCos = Math.cos(bandAngle);
            const bandSin = Math.sin(bandAngle);
            // Gradient perpendicular to the band direction
            const bGrad = c.createLinearGradient(
                -bandSin * coreR * 1.5, bandCos * coreR * 1.5,
                bandSin * coreR * 1.5, -bandCos * coreR * 1.5
            );
            // Transparent → rainbow stripe → transparent
            // The stripe position shifts over time
            const bandPos = (Math.sin(_eTime * 0.6) * 0.5 + 0.5); // 0-1 oscillating
            const bw = 0.15; // band width
            const b0 = Math.max(0, bandPos - bw * 2);
            const b1 = Math.max(0, bandPos - bw);
            const b2 = Math.min(1, bandPos);
            const b3 = Math.min(1, bandPos + bw);
            const b4 = Math.min(1, bandPos + bw * 2);
            bGrad.addColorStop(0, 'hsla(0,0%,100%,0)');
            if (b0 > 0) bGrad.addColorStop(b0, 'hsla(0,0%,100%,0)');
            bGrad.addColorStop(b1, 'hsla(300, 80%, 80%, 0.5)');
            bGrad.addColorStop((b1+b2)/2, 'hsla(200, 90%, 80%, 0.55)');
            bGrad.addColorStop(b2, 'hsla(120, 80%, 75%, 0.5)');
            bGrad.addColorStop((b2+b3)/2, 'hsla(50, 90%, 80%, 0.5)');
            bGrad.addColorStop(b3, 'hsla(350, 80%, 80%, 0.45)');
            if (b4 < 1) bGrad.addColorStop(b4, 'hsla(0,0%,100%,0)');
            bGrad.addColorStop(1, 'hsla(0,0%,100%,0)');
            c.fillStyle = bGrad;
            c.beginPath();
            c.arc(0, 0, coreR, 0, Math.PI * 2);
            c.fill();

            // Specular highlight
            const specX = Math.cos(_eTime * 2) * coreR * 0.25;
            const specY = Math.sin(_eTime * 2.5) * coreR * 0.25 - coreR * 0.2;
            const specGrad = c.createRadialGradient(specX, specY, 0, specX, specY, coreR * 0.45);
            specGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
            specGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.15)');
            specGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            c.fillStyle = specGrad;
            c.beginPath();
            c.arc(0, 0, coreR, 0, Math.PI * 2);
            c.fill();
        } else {
            let grad = c.createRadialGradient(-coreR*0.3, -coreR*0.3, coreR*0.1, 0, 0, coreR);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, '#aaaaaa');
            grad.addColorStop(0.8, '#333333');
            grad.addColorStop(1, '#050505');
            c.fillStyle = grad;
            c.beginPath();
            c.arc(0, 0, coreR, 0, Math.PI * 2);
            c.fill();
        }
        c.restore();

        // --- PROCEDURAL VERTEX ENGINE ---
        function drawMorphedPolygon(poly, color, alpha, timeMult, phaseOffset) {
            c.fillStyle = color;
            c.globalAlpha = alpha;
            c.beginPath();
            
            for (let i = 0; i < poly.length; i++) {
                let pt = poly[i];
                let dx = pt.x - cx;
                let dy = pt.y - cy;
                let dist = Math.hypot(dx, dy);
                let angle = Math.atan2(dy, dx);

                let targetDist = coreR; 
                let finalDist = targetDist + (dist - targetDist) * en.spikeEmerge;

                if (finalDist > coreR + 1) {
                    let windSway = Math.sin(en.time * timeMult + angle * 4 + phaseOffset) * 0.25 * ((finalDist - coreR) / coreR);
                    angle += windSway;
                }

                let nx = cx + Math.cos(angle) * finalDist;
                let ny = cy + Math.sin(angle) * finalDist;

                if (i === 0) c.moveTo(nx, ny);
                else c.lineTo(nx, ny);
            }
            c.closePath();
            c.fill();
        }

        // --- LAYER 2: FIRST SPIKE LAYER ---
        // Pearly neutral tint — spikes pick up the pearl base color
        drawMorphedPolygon(polyL2, _isPearl ? '#c0b0d0' : '#3e3e3e', _isPearl ? 0.7 : 0.63, 2.5, 0);

        // --- LAYER 3: SECOND SPIKE LAYER ---
        drawMorphedPolygon(polyL3White, _isPearl ? '#f0eaf5' : '#fefefe', _isPearl ? 0.7 : 0.64, 3.0, 1.5);
        drawMorphedPolygon(polyL3Green, _isPearl ? '#b8a8cc' : '#3e3e3e', _isPearl ? 0.7 : 0.64, 3.0, 1.5);

        // --- LAYER 4: FACIAL FEATURES ---
        c.save();
        
        c.fillStyle = huntedTime > 0 ? '#ffffff' : '#cc0000';
        if (huntedTime > 0) {
            c.shadowColor = 'white'; c.shadowBlur = 20;
        }
        c.fill(eyePathL);
        c.fill(eyePathR);
        c.shadowBlur = 0;

        c.fillStyle = '#1d1d1b';
        c.fill(pupilPathL);
        c.fill(pupilPathR);
        c.fill(mouthPath);

        if (en.blink > 0.01) {
            c.fillStyle = '#1d1d1b';
            c.save(); c.clip(eyePathL); c.fillRect(0, 0, 935, 380 + 250 * en.blink); c.restore();
            c.save(); c.clip(eyePathR); c.fillRect(0, 0, 935, 380 + 250 * en.blink); c.restore();
        }

        c.restore();
        c.restore(); 
    } 
    else if (en.type === 'pointDrainer1' && imgEnemy1.complete) {
        c.save();
        c.translate(en.x, en.y);
        c.rotate(en.angle - Math.PI / 2);
        // Draw with explicit dimensions: height = en.r * 2 so the collision circle
        // exactly contains the full enemy height; width is proportional to the SVG aspect.
        const drawH = en.r * 2;
        const drawW = drawH * (179.02 / 234.01);
        const img = (huntedTime > 0 && imgEnemy1Pearl.complete) ? imgEnemy1Pearl : imgEnemy1;
        c.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
        c.restore();
    }
}

function drawBlob(ctx, x, y, radius, wobblePhase, complexity = 5, irregularity = 0.15) {
    const points = [];
    const numPoints = 12;
    for (let i = 0; i < numPoints; i++) {
        const angle = (i / numPoints) * Math.PI * 2;
        // Add a second layer of sine wave for more irregularity
        const r = radius * (1 + Math.sin(angle * complexity + wobblePhase) * irregularity + Math.cos(angle * (complexity - 2) + wobblePhase * 0.5) * irregularity * 0.5);
        points.push({
            x: x + Math.cos(angle) * r,
            y: y + Math.sin(angle) * r
        });
    }

    ctx.beginPath();
    const startPoint = points[numPoints - 1];
    const firstPoint = points[0];
    ctx.moveTo((startPoint.x + firstPoint.x) / 2, (startPoint.y + firstPoint.y) / 2);
    for (let i = 0; i < numPoints; i++) {
        const p1 = points[i];
        const p2 = points[(i + 1) % numPoints];
        ctx.quadraticCurveTo(p1.x, p1.y, (p1.x + p2.x) / 2, (p1.y + p2.y) / 2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
}

// ─────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────
function draw() {
    ctx.fillStyle = '#020202';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Stage 1 — Green Star: subtle ambient tint + edge bloom
    if (playingStage === 1) {
        // Flat colour wash
        ctx.fillStyle = 'rgba(60, 185, 110, 0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Soft green bloom pooling at the edges (gradient cached; rebuilt only on resize)
        if (!_stage1BgGrad) {
            _stage1BgGrad = ctx.createRadialGradient(
                canvas.width * 0.5, canvas.height * 0.5, canvas.height * 0.22,
                canvas.width * 0.5, canvas.height * 0.5, canvas.height * 0.92
            );
            _stage1BgGrad.addColorStop(0, 'rgba(0,0,0,0)');
            _stage1BgGrad.addColorStop(1, 'rgba(60,185,110,0.18)');
        }
        ctx.fillStyle = _stage1BgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    entityCtx.clearRect(0, 0, entityCanvas.width, entityCanvas.height);
    entityCtx.save();
    entityCtx.translate(entityCanvas.width/2, entityCanvas.height/2);
    if (shakeTime > 0) entityCtx.translate(Math.random()*20-10, Math.random()*20-10);
    entityCtx.scale(camera.zoom, camera.zoom);
    entityCtx.translate(-camera.x, -camera.y);

    if (player.anim.hit > 0.01) {
        entityCtx.translate(player.x, player.y);
        const sq = player.anim.hit * 0.4;
        entityCtx.scale(1 + sq, 1 - sq);
        entityCtx.translate(-player.x, -player.y);
    }

    player.particles.forEach(p => {
        entityCtx.strokeStyle = `rgba(255,255,255,${p.life*0.3})`;
        entityCtx.lineWidth = p.w;
        entityCtx.lineCap = 'round';
        entityCtx.beginPath(); entityCtx.moveTo(p.x,p.y);
        entityCtx.lineTo(p.x-(player.x-p.x)*0.12, p.y-((player.y-15)-p.y)*0.12);
        entityCtx.stroke();
    });

    player.bones.forEach(b => {
        const s=b.w*0.85, os=s*1.05, v=[], cos=Math.cos(b.rot), sin=Math.sin(b.rot);
        const addPt = (x,y) => v.push({ x: player.x+b.curX+(x*cos-y*sin), y: player.y+b.curY+(x*sin+y*cos) });
        if (b.type === 'pearl') { 
            b.sphereData = { cx: player.x+b.curX, cy: player.y+b.curY, r: os }; 
        } else if (SHAPE_DATA[b.type]) {
            const shape = SHAPE_DATA[b.type];
            const sc = os / (shape.maxDim / 2.2);
            shape.hull.forEach(pt => addPt(pt.x * sc, pt.y * sc));
        }
        b.polygon = v;
    });

    const pts = [];
    const RAY_COUNT = IS_TOUCH ? 60 : 150;
    const SDF_STEPS = IS_TOUCH ? 10 : 25;
    _refreshSDF(); // cache player state once for all ray-march calls below
    for (let i = 0; i <= RAY_COUNT; i++) {
        const a = (i/RAY_COUNT)*Math.PI*2, dx = Math.cos(a), dy = Math.sin(a);
        let dist = 10;
        for (let s = 0; s < SDF_STEPS; s++) {
            const d = getSceneSDF(player.x+dx*dist, player.y+dy*dist);
            dist += d < 0 ? Math.abs(d)*0.5+0.5 : -(Math.abs(d)*0.5+0.5);
            if (Math.abs(d) < 1) break;
        }
        dist += Math.max(0, Math.sin(a*4+player.anim.time*2.5)*8 + Math.cos(a*7-player.anim.time*1.5)*5);
        pts.push({ x: player.x+dx*dist, y: player.y+dy*dist });
    }
    const bodyPath = new Path2D();
    pts.forEach((pt, i) => { if (i===0) bodyPath.moveTo(pt.x,pt.y); else bodyPath.lineTo(pt.x,pt.y); });
    bodyPath.closePath();

    if (player.history.length > 2) {
        entityCtx.beginPath();
        let left = [], right = [];
        
        for (let i = 0; i < player.history.length - 1; i++) {
            let p1 = player.history[i];
            let p2 = player.history[i+1];
            
            let ang;
            if (i === 0 && Math.hypot(player.vx, player.vy) * 3.2 > 1) {
                ang = Math.atan2(-player.vy, -player.vx);
            } else {
                ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            }
            
            let perp = ang + Math.PI / 2;
            
            let progress = i / (player.history.length - 1);
            let baseW = (i < 5) ? ((player.baseR + player.wobble)*(1-i/5) + maxLimbDist*(i/5)) : maxLimbDist;
            let w = baseW * (1 - progress * 0.35); 
            
            left.push({ x: p1.x + Math.cos(perp)*w, y: p1.y + Math.sin(perp)*w });
            right.push({ x: p1.x - Math.cos(perp)*w, y: p1.y - Math.sin(perp)*w });
        }
        
        if (left.length > 0) {
            entityCtx.moveTo(left[0].x, left[0].y);
            for(let i=1; i<left.length; i++) entityCtx.lineTo(left[i].x, left[i].y);
            
            let endP = player.history[player.history.length-1];
            let lastRight = right[right.length-1];
            let backAng = Math.atan2(endP.y - player.history[player.history.length-2].y, endP.x - player.history[player.history.length-2].x);
            entityCtx.quadraticCurveTo(endP.x + Math.cos(backAng)*maxLimbDist, endP.y + Math.sin(backAng)*maxLimbDist, lastRight.x, lastRight.y);
            
            for(let i=right.length-2; i>=0; i--) entityCtx.lineTo(right[i].x, right[i].y);
            entityCtx.closePath();

            let fadeTarget = player.history[Math.floor(player.history.length * 0.7)] || player.history[player.history.length-1];
            let distToTarget = Math.hypot(fadeTarget.x - player.x, fadeTarget.y - player.y);
            let safeOffset = Math.min(0.4, (maxLimbDist * 0.8) / (distToTarget || 1));

            let trGrad = entityCtx.createLinearGradient(player.x, player.y, fadeTarget.x, fadeTarget.y);
            // Updated dynamic streak to match player beige 255,220,179
            trGrad.addColorStop(0, hexToRgba(window.PLAYER_COLOR, 0.95));
            trGrad.addColorStop(safeOffset, hexToRgba(window.PLAYER_COLOR, 0.85));
            trGrad.addColorStop(1, hexToRgba(window.PLAYER_COLOR, 0));
            
            entityCtx.fillStyle = trGrad;
            entityCtx.fill();
        }
    }

    entityCtx.save();
    entityCtx.globalCompositeOperation = 'destination-out';
    entityCtx.fillStyle = '#000';
    entityCtx.fill(bodyPath);
    entityCtx.restore();

    let spdVal = Math.hypot(player.vx, player.vy) * 3.2;
    if (spdVal > 0.1 && player.history.length > 5) {
        
        const drawDynamicStreak = (baseOffset, baseWidth, baseLen, timeOffset) => {
            let dynLen = baseLen * (0.4 + 0.6 * Math.sin(player.anim.time * 5 + timeOffset));
            if (dynLen <= 0.1) return; 
            
            let endIdx = Math.floor(player.history.length * dynLen);
            if(endIdx < 2) return;
            
            let dynWidth = baseWidth * (0.5 + 0.5 * Math.sin(player.anim.time * 8 + timeOffset * 2));
            let alpha = 0.8 * Math.max(0, Math.sin(player.anim.time * 4 + timeOffset * 3));
            if (alpha <= 0.01) return;

            entityCtx.beginPath();
            for (let i = 0; i < endIdx; i++) {
                let p1 = player.history[i];
                let p2 = player.history[i+1] || p1;
                let ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                let perp = ang + Math.PI / 2;
                
                let px = p1.x + Math.cos(perp) * (maxLimbDist * baseOffset);
                let py = p1.y + Math.sin(perp) * (maxLimbDist * baseOffset);
                
                if (i === 0) entityCtx.moveTo(px, py);
                else entityCtx.lineTo(px, py);
            }
            
            let last = player.history[endIdx-1];
            let spdGrad = entityCtx.createLinearGradient(player.x, player.y, last.x, last.y);
            spdGrad.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
            spdGrad.addColorStop(1, "rgba(255, 255, 255, 0)");
            
            entityCtx.strokeStyle = spdGrad;
            entityCtx.lineWidth = maxLimbDist * dynWidth;
            entityCtx.lineCap = 'round';
            entityCtx.lineJoin = 'round';
            entityCtx.stroke();
        };

        drawDynamicStreak(-0.55, 0.18, 0.7, 0); 
        drawDynamicStreak(-0.25, 0.25, 0.9, 2.2);
